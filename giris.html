<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function(){
      try {
        if (localStorage.getItem("ag_theme_v1") === "dark") {
          document.documentElement.classList.add("ag-dark");
          var st = document.createElement("style");
          st.id = "ag-theme-preload";
          st.textContent = "html.ag-dark{background:#111214;color:#eceef2;}html.ag-dark body{background:#111214;color:#eceef2;}";
          document.head.appendChild(st);
        }
      } catch (_) {}
    })();
  </script>
  <title>Archilink | Giriş Yap</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body data-page="login" class="bg-white text-[#111] min-h-screen font-sans antialiased">
  <div id="site-header"></div>
  <main class="px-5 sm:px-6 lg:px-8 py-14 lg:py-20 bg-white">
    <div class="max-w-[920px] lg:max-w-[1040px] mx-auto">
      <div class="text-center mb-8 lg:mb-10">
        <h1 class="text-[32px] lg:text-[40px] font-semibold tracking-tight text-[#1d1d1f]">Giriş Yap</h1>
        <p class="text-[15px] text-[#6e6e73] mt-2.5">Mimar veya marka hesabınla devam et.</p>
      </div>
      <div class="grid sm:grid-cols-2 gap-5 lg:gap-7 items-stretch w-full">

        <!-- Mimar -->
        <article class="flex flex-col h-full min-h-[280px] rounded-[20px] bg-white border border-black/[0.08] p-7 lg:p-9 shadow-[0_4px_24px_rgba(0,0,0,0.06),0_1px_3px_rgba(0,0,0,0.04)]">
          <div class="w-9 h-9 rounded-xl bg-[#f5f5f7] flex items-center justify-center mb-3">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <p class="text-[11px] uppercase tracking-[0.16em] text-[#6e6e73] font-semibold">Mimar / Tasarımcı</p>
          <h2 class="text-[21px] font-semibold mt-1.5 tracking-tight text-[#1d1d1f]">Mimar Hesabı</h2>
          <p class="text-[13px] text-[#6e6e73] mt-2 leading-relaxed flex-1">Ürün ve projeleri favorile, tasarım panoları ve koleksiyonlar.</p>
          <div class="mt-auto pt-6 space-y-2.5">
            <a href="/mimar-giris.html" class="w-full h-10 rounded-xl bg-[#1d1d1f] text-white text-[13px] font-semibold inline-flex items-center justify-center hover:bg-black/88 transition">Mimar Girişi</a>
            <a href="/mimar-giris.html#mimar-kayit" class="w-full h-10 rounded-xl border border-black/[0.12] text-[13px] font-semibold text-[#1d1d1f] inline-flex items-center justify-center hover:bg-black/[0.03] transition">Mimar Kaydı</a>
          </div>
        </article>

        <!-- Marka -->
        <article class="flex flex-col h-full min-h-[280px] rounded-[20px] bg-white border border-black/[0.08] p-7 lg:p-9 shadow-[0_4px_24px_rgba(0,0,0,0.06),0_1px_3px_rgba(0,0,0,0.04)]">
          <div class="w-9 h-9 rounded-xl bg-[#f5f5f7] flex items-center justify-center mb-3">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          </div>
          <p class="text-[11px] uppercase tracking-[0.16em] text-[#6e6e73] font-semibold">Üretici / Marka</p>
          <h2 class="text-[21px] font-semibold mt-1.5 tracking-tight text-[#1d1d1f]">Marka Hesabı</h2>
          <p class="text-[13px] text-[#6e6e73] mt-2 leading-relaxed flex-1">Ürün yükleme, teknik doküman ve panelden performans takibi.</p>
          <div class="mt-auto pt-6 space-y-2.5">
            <a href="/marka-giris.html" class="w-full h-10 rounded-xl bg-[#1d1d1f] text-white text-[13px] font-semibold inline-flex items-center justify-center hover:bg-black/88 transition">Marka Girişi</a>
            <a href="/marka-basvuru.html" class="w-full h-10 rounded-xl border border-black/[0.12] text-[13px] font-semibold text-[#1d1d1f] inline-flex items-center justify-center hover:bg-black/[0.03] transition">Marka Başvurusu</a>
          </div>
        </article>

      </div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="/core.js"></script>
  <script src="/layout.js"></script>
</body>
</html>
