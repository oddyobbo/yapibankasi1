<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function(){
      try {
        if (localStorage.getItem("ag_theme_v1") === "dark") {
          document.documentElement.classList.add("ag-dark");
          var st = document.createElement("style");
          st.id = "ag-theme-preload";
          st.textContent = "html.ag-dark{background:#111214;color:#eceef2;}html.ag-dark body{background:#111214;color:#eceef2;}";
          document.head.appendChild(st);
        }
      } catch (_) {}
    })();
  </script>
  <title>Archilink | Hesap Girişi</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body data-page="login" class="bg-white text-[#111] min-h-screen font-sans antialiased">
  <div id="site-header"></div>
  <main class="px-5 sm:px-6 lg:px-8 py-14 lg:py-20 bg-white">
    <div class="max-w-[440px] mx-auto">
      <div class="text-center mb-8">
        <h1 class="text-[32px] lg:text-[36px] font-semibold tracking-tight text-[#1d1d1f]">Hesap Girişi</h1>
        <p class="text-[15px] text-[#6e6e73] mt-2.5">E-posta ve şifrenle panele devam et.</p>
      </div>

      <form id="login-form" class="rounded-[20px] border border-black/[0.08] bg-white p-7 lg:p-8 shadow-[0_4px_24px_rgba(0,0,0,0.06)] space-y-4" autocomplete="on">
        <label class="block">
          <span class="text-[13px] font-medium text-[#1d1d1f]">E-posta</span>
          <input name="email" type="email" required autocomplete="username" class="mt-1.5 w-full h-11 rounded-xl border border-black/[0.12] px-3 text-[14px] outline-none focus:border-black/25" />
        </label>
        <label class="block">
          <span class="text-[13px] font-medium text-[#1d1d1f]">Şifre</span>
          <input name="password" type="password" required autocomplete="current-password" class="mt-1.5 w-full h-11 rounded-xl border border-black/[0.12] px-3 text-[14px] outline-none focus:border-black/25" />
        </label>
        <p id="msg" class="text-[13px] text-red-600 hidden" role="alert"></p>
        <button type="submit" class="w-full h-11 rounded-xl bg-[#1d1d1f] text-white text-[14px] font-semibold hover:bg-black transition">Giriş Yap</button>
      </form>

      <div class="mt-6 text-center text-[14px] text-[#6e6e73] space-y-2">
        <p>
          <a href="/mimar-giris.html#mimar-kayit" class="text-[#1d1d1f] font-medium hover:underline">Ücretsiz Kaydol</a>
        </p>
        <p>
          <a href="/marka-basvuru.html" class="hover:text-[#1d1d1f] hover:underline">Marka hesabı için başvuru yapın</a>
        </p>
      </div>
    </div>
  </main>
  <div id="site-footer"></motion>
  <script src="/core.js"></script>
  <script src="/layout.js"></script>
  <script>
    const form = document.getElementById("login-form");
    const msg = document.getElementById("msg");

    function showMsg(text) {
      if (!msg) return;
      if (!text) {
        msg.textContent = "";
        msg.classList.add("hidden");
        return;
      }
      msg.textContent = text;
      msg.classList.remove("hidden");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      showMsg("");
      const submitBtn = form.querySelector('button[type="submit"]');
      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = "Giriş yapılıyor…";
      }
      try {
        await AG.ready;
        const fd = new FormData(form);
        const res = await AG.loginUnified({
          email: String(fd.get("email") || "").trim(),
          password: String(fd.get("password") || ""),
        });
        if (!res.ok) {
          showMsg(res.message || "Giriş başarısız.");
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.textContent = "Giriş Yap";
          }
          return;
        }
        window.location.href = res.redirect;
      } catch (_) {
        showMsg("Bağlantı hatası. Lütfen tekrar deneyin.");
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Giriş Yap";
        }
      }
    });
  </script>
</body>
</html>
