<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity | Ürün Kataloğu</title>
  <meta name="description" content="Akustik, aydınlatma, dış cephe, zemin ve daha fazlası. Teknik filtrelerle doğru mimari malzemeyi saniyeler içinde bul.">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .filter-chip { cursor: pointer; transition: background .2s, color .2s, border-color .2s; }
    .filter-chip.active { background: #0b0b0c; color: #fff; border-color: #0b0b0c; }
    .card-lift { transition: transform .3s cubic-bezier(.2,.7,.2,1), border-color .3s; }
    .card-lift:hover { transform: translateY(-3px); border-color: rgba(0,0,0,.22); }
    .filter-group-body { max-height: 0; overflow: hidden; transition: max-height .2s ease; }
    .filter-group.open .filter-group-body { max-height: 280px; overflow-y: auto; }
  </style>
</head>
<body data-page="products" class="bg-white text-[#0b0b0c] min-h-screen">
  <div id="site-header"></div>
  <div id="toast" class="hidden fixed top-5 right-5 z-50 px-4 py-2 rounded-xl bg-black text-white text-[13px] shadow-lg"></div>

  <main>
    <section class="border-b border-black/[0.08] px-6 lg:px-10 py-8">
      <div class="max-w-[1360px] mx-auto">
        <div class="flex flex-wrap items-center gap-2">
          <button class="px-4 h-10 rounded-xl border border-black/15 text-[13px] font-medium">Filtreler</button>
          <div id="quick-chips" class="flex flex-wrap gap-2"></div>
          <div class="ml-auto w-full lg:w-[320px]">
            <input id="search-input" type="text" placeholder="Filtre ara / ürün ara" class="w-full h-10 rounded-xl border border-black/15 bg-[#fafafa] px-3 text-[13px] outline-none focus:border-black/40">
          </div>
        </div>
      </div>
    </section>

    <section class="px-6 lg:px-10 py-6">
      <div class="max-w-[1360px] mx-auto grid lg:grid-cols-[280px_minmax(0,1fr)] gap-6">
        <aside class="border border-black/[0.08] rounded-2xl p-4 h-fit sticky top-[84px]">
          <p class="text-[12px] text-[#6e6e73] mb-2">Filtreler</p>
          <div id="filters-panel" class="space-y-2"></div>
        </aside>
        <div>
          <div class="mb-3 text-[13px] text-[#6e6e73]" id="result-count"></div>
          <div id="products-grid" class="grid sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-5"></div>
          <p id="empty-msg" class="hidden text-center text-[#6e6e73] py-20 text-[15px]">Arama kriterlerine uygun ürün bulunamadı.</p>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <div id="board-modal" class="hidden fixed inset-0 z-50">
    <div class="absolute inset-0 bg-black/35" data-board-close="1"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div class="w-full max-w-[460px] rounded-2xl bg-white border border-black/10 p-5">
        <h3 class="text-[19px] font-semibold">Board'a ekle</h3>
        <p class="text-[13px] text-[#6e6e73] mt-1">Var olan bir board seç veya hızlıca yeni board oluştur.</p>
        <div id="board-list" class="mt-4 space-y-2 max-h-[220px] overflow-auto"></div>
        <form id="quick-board-form" class="mt-4 flex gap-2">
          <input id="quick-board-name" class="flex-1 h-10 rounded-xl border border-black/15 px-3 text-[14px]" placeholder="Yeni board adı">
          <button class="h-10 px-3 rounded-xl bg-black text-white text-[13px]">Oluştur + Ekle</button>
        </form>
        <div class="mt-4 flex justify-end">
          <button id="board-cancel-btn" class="h-10 px-4 rounded-xl border border-black/15 text-[13px]">Vazgeç</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/core.js"></script>
  <script src="/layout.js"></script>
  <script>
    const STATIC = [];
    let allProducts = [...STATIC];
    let architectSession = null;
    let favoriteProductIds = new Set();
    let moodboards = [];
    let selectedProduct = null;
    let searchQuery = "";
    let activeQuick = "";
    const selected = {
      brand: new Set(),
      category: new Set(),
      subcategory: new Set(),
      hasPdf: new Set(),
      hasCad: new Set(),
      hasBim: new Set(),
      fireClass: new Set(),
    };

    AG.ready.then(async () => {
      architectSession = await AG.getSessionArchitect();
      const [dbProds, favs] = await Promise.all([
        AG.getProducts(),
        architectSession ? AG.getFavoriteProducts() : Promise.resolve([])
      ]);
      moodboards = architectSession ? await AG.getMoodboards() : [];
      favoriteProductIds = new Set((favs || []).map((x) => x.id));
      allProducts = [...STATIC, ...dbProds];
      const qp = new URLSearchParams(location.search);
      const qpCategory = (qp.get("category") || "").trim();
      const qpSub = (qp.get("sub") || "").trim();
      activeQuick = qpSub || qpCategory || "";
      renderQuickChips();
      renderFilterPanel();
      render();
    });

    function renderCard(p) {
      const isFav = favoriteProductIds.has(p.id);
      return `
        <div class="card-lift group rounded-2xl overflow-hidden border border-black/[0.08] bg-white flex flex-col relative">
          <a href="/urun-unica-baffle.html?id=${encodeURIComponent(p.id)}" data-view="${p.id}" class="block">
          <div class="overflow-hidden h-48 bg-[#f5f5f7]">
            <img src="${p.image || 'https://images.unsplash.com/photo-1600607686527-6fb886090705?q=80&w=800&auto=format&fit=crop'}"
              alt="${p.name}" class="w-full h-full object-cover group-hover:scale-[1.03] transition duration-500">
          </div>
          <div class="p-5 flex flex-col flex-1">
            <p class="text-[11px] uppercase tracking-[0.14em] text-[#6e6e73] font-medium">${p.category}</p>
            <h3 class="text-[15px] font-semibold mt-1.5 leading-snug">${p.name}</h3>
            <p class="text-[12px] text-[#6e6e73] mt-1.5 leading-relaxed">${p.spec || ""}</p>
            <div class="mt-auto pt-4 flex items-center justify-between">
              <span class="text-[12px] text-[#6e6e73]">${p.brandName || ""}</span>
              <span class="text-[12px] font-medium text-[#0b0b0c] opacity-0 group-hover:opacity-100 transition">Detay →</span>
            </div>
          </div>
          </a>
          ${
            architectSession
              ? `<button data-fav-product="${p.id}" class="absolute top-3 left-3 px-2.5 h-8 rounded-full text-[12px] border border-black/15 bg-white/95 hover:bg-black hover:text-white transition">${isFav ? "★ Favoride" : "☆ Favorile"}</button>`
              : `<a href="/mimar-giris.html" class="absolute top-3 left-3 px-2.5 h-8 inline-flex items-center rounded-full text-[11px] border border-black/15 bg-white/95">Giriş yapıp kaydet</a>`
          }
          ${
            architectSession
              ? `<button data-add-board="${p.id}" class="absolute top-3 right-3 px-2.5 h-8 rounded-full text-[12px] border border-black/15 bg-white/95 hover:bg-black hover:text-white transition">Add to Board</button>`
              : `<a href="/mimar-giris.html" class="absolute top-3 right-3 px-2.5 h-8 inline-flex items-center rounded-full text-[11px] border border-black/15 bg-white/95">Add to Board</a>`
          }
        </div>`;
    }

    function showToast(text) {
      const t = document.getElementById("toast");
      t.textContent = text;
      t.classList.remove("hidden");
      setTimeout(() => t.classList.add("hidden"), 1700);
    }

    function closeBoardModal() {
      document.getElementById("board-modal").classList.add("hidden");
      selectedProduct = null;
    }

    function renderBoardList() {
      const wrap = document.getElementById("board-list");
      if (!moodboards.length) {
        wrap.innerHTML = `<p class="text-[13px] text-[#6e6e73]">Henüz board yok. Aşağıdan hızlıca oluşturabilirsin.</p>`;
        return;
      }
      wrap.innerHTML = moodboards.map((m) => `
        <button data-board-id="${m.id}" class="w-full h-10 rounded-xl border border-black/15 text-[13px] text-left px-3 hover:border-black/35">${m.name || "Moodboard"}</button>
      `).join("");
      wrap.querySelectorAll("[data-board-id]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (!selectedProduct) return;
          const res = await AG.addProductToMoodboard({ moodboardId: btn.dataset.boardId, product: selectedProduct });
          if (!res.ok) return;
          moodboards = await AG.getMoodboards();
          closeBoardModal();
          showToast("Board'a eklendi");
        });
      });
    }

    function openBoardModal(product) {
      if (!architectSession) {
        location.href = "/mimar-giris.html";
        return;
      }
      selectedProduct = product;
      renderBoardList();
      document.getElementById("board-modal").classList.remove("hidden");
    }

    function getTaxonomy(p) {
      const raw = p.category || "";
      const [main, sub] = raw.split(">").map((x) => (x || "").trim());
      return { main: main || raw, sub: sub || "" };
    }

    function matchesBoolean(setValue, boolValue) {
      if (!setValue.size) return true;
      return setValue.has(boolValue ? "Var" : "Yok");
    }

    function filtered() {
      return allProducts.filter(p => {
        const tax = getTaxonomy(p);
        if (activeQuick && tax.sub !== activeQuick && tax.main !== activeQuick) return false;
        if (selected.brand.size && !selected.brand.has(p.brandName || "")) return false;
        if (selected.category.size && !selected.category.has(tax.main)) return false;
        if (selected.subcategory.size && !selected.subcategory.has(tax.sub)) return false;
        if (!matchesBoolean(selected.hasPdf, Boolean(p.files?.pdfUrl))) return false;
        if (!matchesBoolean(selected.hasCad, Boolean(p.files?.cadUrl))) return false;
        if (!matchesBoolean(selected.hasBim, Boolean(p.files?.bimUrl))) return false;
        const fire = (p.technical?.fireClass || "").trim();
        if (selected.fireClass.size && !selected.fireClass.has(fire)) return false;
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          return (p.name + p.category + p.spec + p.brandName + JSON.stringify(p.technical || {})).toLowerCase().includes(q);
        }
        return true;
      });
    }

    function distinct(list) {
      return [...new Set(list.filter(Boolean))].sort((a, b) => a.localeCompare(b, "tr"));
    }

    function renderQuickChips() {
      const quick = document.getElementById("quick-chips");
      const subs = distinct(allProducts.map((p) => getTaxonomy(p).sub || getTaxonomy(p).main)).slice(0, 10);
      const total = allProducts.length;
      quick.innerHTML = `
        <button data-quick="" class="filter-chip ${!activeQuick ? "active" : ""} px-3 h-10 rounded-xl border border-black/[0.08] text-[13px]">Tümü <span class="ml-1 text-[11px] opacity-70">${total}</span></button>
        ${subs.map((s) => `<button data-quick="${s}" class="filter-chip ${activeQuick === s ? "active" : ""} px-3 h-10 rounded-xl border border-black/[0.08] text-[13px]">${s}</button>`).join("")}
      `;
      quick.querySelectorAll("[data-quick]").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeQuick = btn.dataset.quick || "";
          renderQuickChips();
          render();
        });
      });
    }

    function groupTemplate(id, title, values) {
      return `
        <div class="filter-group border border-black/[0.08] rounded-xl open" data-group="${id}">
          <button class="w-full px-3 py-2.5 text-left flex items-center justify-between text-[13px] font-semibold" data-toggle="${id}">
            <span>${title}</span><span>⌄</span>
          </button>
          <div class="filter-group-body">
            <div class="px-3 pb-3 space-y-1">
              ${values.map((v) => `
                <label class="flex items-center gap-2 text-[12px] text-[#4a4a4f]">
                  <input type="checkbox" data-filter="${id}" value="${v}" class="rounded border-black/20">
                  <span>${v}</span>
                </label>`).join("")}
            </div>
          </div>
        </div>`;
    }

    function renderFilterPanel() {
      const panel = document.getElementById("filters-panel");
      const brands = distinct(allProducts.map((p) => p.brandName || ""));
      const categories = distinct(allProducts.map((p) => getTaxonomy(p).main));
      const subcategories = distinct(allProducts.map((p) => getTaxonomy(p).sub));
      const fires = distinct(allProducts.map((p) => p.technical?.fireClass || ""));

      panel.innerHTML = [
        groupTemplate("brand", "Marka", brands),
        groupTemplate("category", "Kategori", categories),
        groupTemplate("subcategory", "Alt Kategori", subcategories),
        groupTemplate("hasPdf", "PDF", ["Var", "Yok"]),
        groupTemplate("hasCad", "CAD", ["Var", "Yok"]),
        groupTemplate("hasBim", "BIM", ["Var", "Yok"]),
        groupTemplate("fireClass", "Yanıcılık", fires),
      ].join("");

      panel.querySelectorAll("[data-toggle]").forEach((btn) => {
        btn.addEventListener("click", () => btn.closest(".filter-group").classList.toggle("open"));
      });
      panel.querySelectorAll("[data-filter]").forEach((cb) => {
        cb.addEventListener("change", () => {
          const key = cb.dataset.filter;
          if (cb.checked) selected[key].add(cb.value);
          else selected[key].delete(cb.value);
          render();
        });
      });
    }

    function render() {
      const list = filtered();
      const grid = document.getElementById("products-grid");
      const empty = document.getElementById("empty-msg");
      const count = document.getElementById("result-count");
      count.textContent = `${list.length} ürün listeleniyor`;
      if (!list.length) { grid.innerHTML = ""; empty.classList.remove("hidden"); return; }
      empty.classList.add("hidden");
      grid.innerHTML = list.map(renderCard).join("");
      grid.querySelectorAll("[data-view]").forEach(a =>
        a.addEventListener("click", () => AG.incrementView(a.dataset.view).catch(() => {}))
      );
      grid.querySelectorAll("[data-fav-product]").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.preventDefault();
          e.stopPropagation();
          const id = btn.dataset.favProduct;
          const product = allProducts.find((x) => x.id === id);
          if (!product) return;
          const res = await AG.toggleFavoriteProduct({
            id: product.id,
            name: product.name,
            image: product.image,
            category: product.category,
            url: `/urun-unica-baffle.html?id=${encodeURIComponent(product.id)}`
          });
          if (!res?.ok) return;
          if (res.active) favoriteProductIds.add(id);
          else favoriteProductIds.delete(id);
          btn.textContent = res.active ? "★ Favoride" : "☆ Favorile";
        });
      });
      grid.querySelectorAll("[data-add-board]").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          const product = allProducts.find((x) => x.id === btn.dataset.addBoard);
          if (!product) return;
          openBoardModal({ id: product.id, name: product.name, image: product.image });
        });
      });
    }

    document.getElementById("search-input").addEventListener("input", e => {
      searchQuery = e.target.value.trim();
      render();
    });
    document.getElementById("board-cancel-btn").addEventListener("click", closeBoardModal);
    document.querySelectorAll("[data-board-close='1']").forEach((el) => el.addEventListener("click", closeBoardModal));
    document.getElementById("quick-board-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!selectedProduct) return;
      const name = document.getElementById("quick-board-name").value.trim();
      if (!name) return;
      const res = await AG.addProductToMoodboard({ moodboardName: name, product: selectedProduct });
      if (!res.ok) return;
      moodboards = await AG.getMoodboards();
      document.getElementById("quick-board-name").value = "";
      closeBoardModal();
      showToast("Board'a eklendi");
    });

    renderQuickChips();
    renderFilterPanel();
    render();
  </script>
</body>
</html>
