<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archilink | Mimar Paneli</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body data-page="architect-panel" class="bg-[#f5f5f7] text-[#111] min-h-screen">
  <div id="site-header"></div>
  <div id="toast" class="hidden fixed top-5 right-5 z-50 px-4 py-2 rounded-xl bg-black text-white text-[13px] shadow-lg"></div>
  <main class="px-6 lg:px-10 py-8">
    <section class="max-w-[1250px] mx-auto">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <p id="welcome" class="text-[13px] text-[#6e6e73]"></p>
          <h1 class="text-[30px] font-semibold">Mimar Paneli</h1>
        </div>
        <div class="flex gap-2">
          <button id="new-moodboard-btn" class="h-10 px-4 rounded-full bg-black text-white text-[13px] font-semibold">+ Yeni Tasarım Panosu</button>
          <button id="logout-btn" class="h-10 px-4 rounded-full border border-black/15 text-[13px]">Çıkış</button>
        </div>
      </div>

      <div class="mt-6 flex flex-wrap gap-2" id="tabs"></div>
      <section class="mt-4 rounded-2xl border border-black/10 bg-white p-5">
        <div id="tab-content"></div>
      </section>
    </section>
  </main>
  <div id="site-footer"></div>
  <div id="board-modal" class="hidden fixed inset-0 z-50">
    <div class="absolute inset-0 bg-black/35" data-board-close="1"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div class="w-full max-w-[460px] rounded-2xl bg-white border border-black/10 p-5">
        <h3 class="text-[19px] font-semibold">Board'a ekle</h3>
        <p class="text-[13px] text-[#6e6e73] mt-1">Var olan bir board seç veya hızlıca yeni board oluştur.</p>
        <div id="board-list" class="mt-4 space-y-2 max-h-[220px] overflow-auto"></div>
        <form id="quick-board-form" class="mt-4 flex gap-2">
          <input id="quick-board-name" class="flex-1 h-10 rounded-xl border border-black/15 px-3 text-[14px]" placeholder="Yeni board adı">
          <button class="h-10 px-3 rounded-xl bg-black text-white text-[13px]">Oluştur + Ekle</button>
        </form>
        <div class="mt-4 flex justify-end">
          <button id="board-cancel-btn" class="h-10 px-4 rounded-xl border border-black/15 text-[13px]">Vazgeç</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/core.js"></script>
  <script src="/layout.js"></script>
  <script>
    const TAB_LABELS = {
      "fav-products": "Favori Ürünler",
      "fav-projects": "Favori Projeler",
      "office-projects": "Ofis projeleri",
      "collections": "Koleksiyonlar",
      "moodboards": "Tasarım Panoları"
    };
    let TAB_IDS = ["fav-products", "fav-projects", "collections", "moodboards"];

    function tabIdsForSession(session) {
      const base = ["fav-products", "fav-projects", "collections", "moodboards"];
      if (session?.architectProfileType === "office") {
        return ["fav-products", "fav-projects", "office-projects", "collections", "moodboards"];
      }
      return base;
    }

    function escHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
    let activeTab = "fav-products";
    let moodboards = [];
    let selectedProduct = null;

    function renderTabs() {
      const el = document.getElementById("tabs");
      el.innerHTML = TAB_IDS.map((id) =>
        `<button data-tab="${id}" class="h-9 px-4 rounded-full text-[13px] ${activeTab === id ? "bg-black text-white" : "bg-white border border-black/15"}">${TAB_LABELS[id]}</button>`
      ).join("");
      el.querySelectorAll("[data-tab]").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeTab = btn.dataset.tab;
          renderTabs();
          renderContent();
        });
      });
    }

    function cardTemplate(item, href, withBoardAction = false) {
      const safeProduct = encodeURIComponent(JSON.stringify({ id: item.id, name: item.name, image: item.image || "" }));
      return `
        <div class="block rounded-xl border border-black/10 hover:border-black/25 transition overflow-hidden relative">
          <a href="${href}" class="block">
            <img src="${item.image || "https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?q=80&w=1200&auto=format&fit=crop"}" class="w-full h-36 object-cover" alt="${item.name}">
            <div class="p-3">
              <p class="text-[14px] font-medium">${item.name}</p>
              <p class="text-[12px] text-[#6e6e73] mt-1">${new Date(item.savedAt || Date.now()).toLocaleDateString("tr-TR")}</p>
            </div>
          </a>
          ${withBoardAction ? `<button data-add-board="${safeProduct}" class="absolute top-3 right-3 px-2.5 h-8 rounded-full text-[12px] border border-black/15 bg-white/95 hover:bg-black hover:text-white transition">Add to Board</button>` : ""}
        </div>`;
    }

    function showToast(text) {
      const t = document.getElementById("toast");
      t.textContent = text;
      t.classList.remove("hidden");
      setTimeout(() => t.classList.add("hidden"), 1700);
    }

    function closeBoardModal() {
      document.getElementById("board-modal").classList.add("hidden");
      selectedProduct = null;
    }

    function renderBoardList() {
      const wrap = document.getElementById("board-list");
      if (!moodboards.length) {
        wrap.innerHTML = `<p class="text-[13px] text-[#6e6e73]">Henüz board yok. Aşağıdan hızlıca oluşturabilirsin.</p>`;
        return;
      }
      wrap.innerHTML = moodboards.map((m) => `
        <button data-board-id="${m.id}" class="w-full h-10 rounded-xl border border-black/15 text-[13px] text-left px-3 hover:border-black/35">${m.name || "Moodboard"}</button>
      `).join("");
      wrap.querySelectorAll("[data-board-id]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (!selectedProduct) return;
          const res = await AG.addProductToMoodboard({ moodboardId: btn.dataset.boardId, product: selectedProduct });
          if (!res.ok) return;
          moodboards = await AG.getMoodboards();
          closeBoardModal();
          showToast("Board'a eklendi");
        });
      });
    }

    function openBoardModal(product) {
      selectedProduct = product;
      renderBoardList();
      document.getElementById("board-modal").classList.remove("hidden");
    }

    function bindBoardButtons(root) {
      root.querySelectorAll("[data-add-board]").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          const parsed = JSON.parse(decodeURIComponent(btn.dataset.addBoard || "{}"));
          openBoardModal(parsed);
        });
      });
    }

    async function renderContent() {
      const content = document.getElementById("tab-content");
      if (activeTab === "fav-products") {
        const list = await AG.getFavoriteProducts();
        content.innerHTML = list.length
          ? `<div class="flex flex-wrap items-center justify-between gap-3 mb-4">
              <p class="text-[13px] text-[#6e6e73]">Seçtiğin ürünleri yan yana teknik özelliklerle karşılaştır.</p>
              <a href="/urunler.html?compare=favorites" class="inline-flex h-9 items-center gap-2 px-4 rounded-full border border-black/15 text-[13px] font-medium hover:bg-black/[0.04] transition">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="3" width="7" height="18" rx="1.5"/><rect x="14" y="3" width="7" height="18" rx="1.5"/></svg>
                Karşılaştır
              </a>
            </div>
            <div class="grid sm:grid-cols-2 xl:grid-cols-3 gap-4">${list.map((x) => cardTemplate(x, x.url || "/urunler.html", true)).join("")}</div>`
          : `<p class="text-[14px] text-[#6e6e73]">Henüz favori ürün yok. Ürünler sayfasından yıldız ile ekleyebilirsin.</p>`;
        bindBoardButtons(content);
        return;
      }

      if (activeTab === "fav-projects") {
        const list = await AG.getFavoriteProjects();
        content.innerHTML = list.length
          ? `<div class="grid sm:grid-cols-2 xl:grid-cols-3 gap-4">${list.map((x) => cardTemplate(x, x.url || "/projeler.html")).join("")}</div>`
          : `<p class="text-[14px] text-[#6e6e73]">Henüz favori proje yok. Projeler sayfasından favorileyebilirsin.</p>`;
        return;
      }

      if (activeTab === "office-projects") {
        const list = await AG.getArchitectOfficeProjects();
        content.innerHTML = `
          <div class="mb-5 rounded-xl border border-black/10 bg-[#fafafa] p-4">
            <p class="text-[14px] font-medium">Yeni proje ekle</p>
            <p class="text-[13px] text-[#6e6e73] mt-1">Eklediğin projeler <a href="/projeler.html" class="underline hover:text-black">Referans Projeler</a> sayfasında ve detay linkiyle yayınlanır.</p>
            <form id="office-project-form" class="mt-4 grid sm:grid-cols-2 gap-3">
              <div class="sm:col-span-2">
                <label class="text-[12px] text-[#6e6e73]">Başlık *</label>
                <input name="title" required class="mt-1 w-full h-10 rounded-xl border border-black/15 px-3 text-[14px]" placeholder="Örn. Ofis cephesi yenileme">
              </div>
              <div>
                <label class="text-[12px] text-[#6e6e73]">Konum</label>
                <input name="location" class="mt-1 w-full h-10 rounded-xl border border-black/15 px-3 text-[14px]" placeholder="İl / semt">
              </div>
              <div>
                <label class="text-[12px] text-[#6e6e73]">Yıl</label>
                <input name="year" class="mt-1 w-full h-10 rounded-xl border border-black/15 px-3 text-[14px]" placeholder="2024">
              </div>
              <div class="sm:col-span-2">
                <label class="text-[12px] text-[#6e6e73]">Mimar / proje ekibi (listede görünen isim)</label>
                <input name="architectName" class="mt-1 w-full h-10 rounded-xl border border-black/15 px-3 text-[14px]" placeholder="Varsayılan: hesap adın">
              </div>
              <div class="sm:col-span-2">
                <label class="text-[12px] text-[#6e6e73]">Kapak görseli URL</label>
                <input name="image" type="url" class="mt-1 w-full h-10 rounded-xl border border-black/15 px-3 text-[14px]" placeholder="https://...">
              </div>
              <div class="sm:col-span-2">
                <label class="text-[12px] text-[#6e6e73]">Açıklama</label>
                <textarea name="description" rows="3" class="mt-1 w-full rounded-xl border border-black/15 px-3 py-2 text-[14px]" placeholder="Proje özeti"></textarea>
              </div>
              <div class="sm:col-span-2">
                <button type="submit" class="h-10 px-5 rounded-full bg-black text-white text-[13px] font-semibold">Projeyi yayınla</button>
              </div>
            </form>
          </div>
          ${
            list.length
              ? `<div class="grid sm:grid-cols-2 xl:grid-cols-3 gap-4">${list
                  .map(
                    (p) => `
                <div class="rounded-xl border border-black/10 overflow-hidden relative">
                  <a href="/proje-detay.html?id=${encodeURIComponent(p.id)}" class="block">
                    <img src="${escHtml(p.image) || "https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?q=80&w=1200&auto=format&fit=crop"}" class="w-full h-36 object-cover" alt="">
                    <div class="p-3">
                      <p class="text-[14px] font-medium">${escHtml(p.title)}</p>
                      <p class="text-[12px] text-[#6e6e73] mt-1">${escHtml(p.location || "—")} · ${escHtml(p.year || "—")}</p>
                    </div>
                  </a>
                  <button type="button" data-delete-office-project="${encodeURIComponent(p.id)}" class="absolute top-2 right-2 px-2.5 h-8 rounded-full text-[12px] border border-black/15 bg-white/95 hover:bg-red-600 hover:text-white hover:border-red-600 transition">Sil</button>
                </div>`
                  )
                  .join("")}</div>`
              : `<p class="text-[14px] text-[#6e6e73]">Henüz ofis projen yok. Yukarıdaki formdan ekleyebilirsin.</p>`
          }
        `;
        return;
      }

      if (activeTab === "collections") {
        const collections = await AG.getCollections();
        content.innerHTML = `
          <form id="collection-form" class="flex gap-2 mb-4">
            <input name="name" required placeholder="Yeni koleksiyon adı (örn. Ofis Lobi Referansları)" class="flex-1 h-10 rounded-xl border border-black/15 px-3 text-[14px]">
            <button class="h-10 px-4 rounded-xl bg-black text-white text-[13px]">Oluştur</button>
          </form>
          ${
            collections.length
              ? `<div class="space-y-3">${collections.map((c) => `<article class="rounded-xl border border-black/10 p-3"><p class="font-medium">${c.name}</p><p class="text-[12px] text-[#6e6e73] mt-1">${(c.items || []).length} kayıt</p></article>`).join("")}</div>`
              : `<p class="text-[14px] text-[#6e6e73]">Henüz koleksiyon yok.</p>`
          }
        `;
        document.getElementById("collection-form").addEventListener("submit", async (e) => {
          e.preventDefault();
          const name = String(new FormData(e.currentTarget).get("name") || "");
          const res = await AG.createCollection(name);
          if (res.ok) renderContent();
        });
        return;
      }

      const list = await AG.getMoodboards();
      content.innerHTML = list.length
        ? `<div class="grid sm:grid-cols-2 xl:grid-cols-3 gap-4">
            ${list.map((m) => `
              <a href="/tasarim-panosu.html?id=${encodeURIComponent(m.id)}" class="rounded-xl border border-black/10 p-4 hover:border-black/25 transition block">
                <p class="font-medium">${m.name || "Moodboard"}</p>
                <p class="text-[12px] text-[#6e6e73] mt-1">${(m.items || []).length} kart</p>
              </a>`).join("")}
          </div>`
        : `<p class="text-[14px] text-[#6e6e73]">Henüz tasarım panosu yok. Yukarıdan yeni pano oluşturabilirsin.</p>`;
    }

    async function boot() {
      await AG.ready;
      const session = await AG.getSessionArchitect();
      if (!session) { location.href = "/mimar-giris.html"; return; }
      TAB_IDS = tabIdsForSession(session);
      const urlTab = new URLSearchParams(location.search).get("tab");
      if (urlTab && TAB_IDS.includes(urlTab)) activeTab = urlTab;
      moodboards = await AG.getMoodboards();
      const roleLabel = session.architectProfileType === "office" ? "Mimarlık ofisi" : "Bireysel mimar";
      document.getElementById("welcome").textContent = `${session.name || "Mimar"} · ${roleLabel}`;
      renderTabs();
      renderContent();

      document.getElementById("logout-btn").addEventListener("click", async () => {
        await AG.logoutArchitect();
        location.href = "/mimar-giris.html";
      });
      document.getElementById("new-moodboard-btn").addEventListener("click", async () => {
        const res = await AG.createMoodboard({ name: "Yeni Tasarım Panosu" });
        if (res.ok) location.href = `/tasarim-panosu.html?id=${encodeURIComponent(res.moodboard.id)}`;
      });

      document.getElementById("board-cancel-btn").addEventListener("click", closeBoardModal);
      document.querySelectorAll("[data-board-close='1']").forEach((el) => el.addEventListener("click", closeBoardModal));
      document.getElementById("quick-board-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        if (!selectedProduct) return;
        const name = document.getElementById("quick-board-name").value.trim();
        if (!name) return;
        const res = await AG.addProductToMoodboard({ moodboardName: name, product: selectedProduct });
        if (!res.ok) return;
        moodboards = await AG.getMoodboards();
        document.getElementById("quick-board-name").value = "";
        closeBoardModal();
        showToast("Board'a eklendi");
      });

      const tabContent = document.getElementById("tab-content");
      tabContent.addEventListener("submit", async (e) => {
        const form = e.target;
        if (!(form instanceof HTMLFormElement) || form.id !== "office-project-form") return;
        e.preventDefault();
        const fd = new FormData(form);
        const res = await AG.addArchitectOfficeProject({
          title: fd.get("title"),
          location: fd.get("location"),
          year: fd.get("year"),
          architectName: fd.get("architectName"),
          description: fd.get("description"),
          image: fd.get("image"),
        });
        if (!res.ok) {
          showToast(res.message || "Kayıt başarısız");
          return;
        }
        form.reset();
        showToast("Proje yayınlandı");
        renderContent();
      });
      tabContent.addEventListener("click", async (e) => {
        const btn = e.target.closest("[data-delete-office-project]");
        if (!btn) return;
        const id = decodeURIComponent(btn.getAttribute("data-delete-office-project") || "");
        if (!id || !confirm("Bu projeyi silmek istediğine emin misin?")) return;
        const res = await AG.deleteArchitectOfficeProject(id);
        if (!res.ok) {
          showToast(res.message || "Silinemedi");
          return;
        }
        showToast("Proje silindi");
        renderContent();
      });
    }

    boot();
  </script>
</body>
</html>
