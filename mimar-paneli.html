<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Archilink | Mimar Paneli</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- UI: Apple-esque (web-design) + refined hierarchy / motion (frontend-design skill) -->
  <style>
    .ag-arch-ui { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; -webkit-font-smoothing: antialiased; }
    @keyframes ag-arch-fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .ag-arch-reveal { animation: ag-arch-fade-up 0.28s cubic-bezier(0.2, 0.85, 0.2, 1) both; }
    .ag-arch-reveal-delay-1 { animation-delay: 0.03s; }
    .ag-arch-reveal-delay-2 { animation-delay: 0.05s; }
    html { scroll-behavior: smooth; }
    .ag-arch-hit {
      display: flex;
      width: 100%;
      min-height: 220px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 2rem 1.5rem;
      text-align: center;
      border-radius: 1rem;
      border: 2px dashed #d2d2d7;
      background: #fafafa;
      transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }
    a.ag-arch-hit, button.ag-arch-hit {
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    a.ag-arch-hit:hover, button.ag-arch-hit:hover {
      border-color: rgba(11, 11, 12, 0.35);
      background: rgba(0, 0, 0, 0.03);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }
    a.ag-arch-hit:focus-visible, button.ag-arch-hit:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(11, 11, 12, 0.18);
    }
    body.panel-fav-compare-active main {
      padding-bottom: 5.5rem;
    }
    [data-panel-product-id].compare-card-shell {
      transition: box-shadow 0.22s ease;
    }
    body.panel-fav-compare-active [data-panel-product-id] {
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }
    body.panel-fav-compare-active [data-panel-product-id]:hover {
      transform: none;
    }
  </style>
</head>
<body data-page="architect-panel" class="ag-arch-ui min-h-screen bg-[#f5f5f7] text-[#0b0b0c] antialiased">
  <div id="site-header"></div>
  <div id="toast" class="hidden fixed top-5 right-5 z-50 max-w-[min(92vw,400px)] rounded-xl border border-black/[0.08] bg-[#1d1d1f]/95 px-4 py-2.5 text-left text-[13px] font-medium text-white shadow-[0_12px_48px_rgba(0,0,0,0.16)] backdrop-blur-md"></div>

  <main class="px-6 pb-16 pt-8 lg:px-10 lg:pb-24 lg:pt-12">
    <section id="architect-dashboard" class="mx-auto max-w-[1200px]">
      <header class="ag-arch-reveal flex flex-col gap-8 lg:flex-row lg:items-end lg:justify-between">
        <div>
          <p id="welcome" class="text-[11px] font-medium uppercase tracking-[0.08em] text-[#8e8e93]"></p>
          <h1 class="mt-2 text-[22px] font-semibold leading-tight tracking-[-0.02em] text-[#0b0b0c] lg:text-[26px]">Mimar Paneli</h1>
          <p class="mt-3 max-w-md text-[13px] leading-relaxed text-[#6e6e73]">Favoriler, koleksiyonlar ve tasarım panoların tek yerde.</p>
        </div>
        <div class="flex flex-shrink-0 flex-wrap items-center justify-end gap-2 sm:gap-3">
          <button type="button" id="logout-btn" class="inline-flex h-[34px] items-center justify-center rounded-full border border-black/[0.12] bg-white px-4 text-[12px] font-medium text-[#0b0b0c] transition hover:bg-black/[0.04] focus:outline-none focus-visible:ring-2 focus-visible:ring-black/15">Çıkış</button>
        </div>
      </header>

      <div class="ag-arch-reveal ag-arch-reveal-delay-1 mt-10">
        <div class="inline-flex w-full max-w-full flex-wrap gap-1 rounded-full bg-[#f2f2f7] p-1 lg:inline-flex" id="tabs" role="tablist" aria-label="Panel sekmeleri"></div>
      </div>

      <section class="ag-arch-reveal ag-arch-reveal-delay-2 mt-6 rounded-2xl border border-black/[0.08] bg-white p-6 shadow-[0_2px_8px_rgba(0,0,0,0.06)] lg:p-8">
        <div id="tab-content"></div>
      </section>
    </section>
  </main>

  <!-- Favori ürünler: karşılaştırma modu alt şeridi (ürünler sayfasıyla aynı mantık) -->
  <div id="panel-fav-compare-bar" class="hidden fixed bottom-0 left-0 right-0 z-[58] border-t border-black/[0.08] bg-white/95 px-4 py-3 shadow-[0_-8px_32px_rgba(0,0,0,.08)] backdrop-blur-md">
    <div class="mx-auto flex max-w-[1200px] flex-wrap items-center justify-between gap-3">
      <p id="panel-fav-compare-bar-text" class="text-[13px] text-[#3a3a3c]">0/5 seçili</p>
      <div class="flex flex-wrap gap-2">
        <button type="button" id="panel-fav-compare-bar-cancel" class="h-9 rounded-full border border-black/15 px-4 text-[13px]">İptal</button>
        <button type="button" id="panel-fav-compare-bar-show" disabled class="h-9 rounded-full bg-[#1d1d1f] px-5 text-[13px] font-semibold text-white disabled:pointer-events-none disabled:opacity-35">Karşılaştırmayı göster</button>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <div id="board-modal" class="hidden fixed inset-0 z-50">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-[2px]" data-board-close="1" aria-hidden="true"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div class="w-full max-w-[440px] rounded-2xl border border-black/[0.06] bg-white p-6 shadow-[0_12px_48px_rgba(0,0,0,0.16)]" role="dialog" aria-modal="true" aria-labelledby="board-modal-title">
        <h3 id="board-modal-title" class="text-[19px] font-semibold tracking-[-0.02em] text-[#0b0b0c]">Panoya ekle</h3>
        <p class="mt-2 text-[13px] leading-relaxed text-[#6e6e73]">Mevcut bir pano seç veya hızlıca yeni oluştur.</p>
        <div id="board-list" class="mt-5 max-h-[220px] space-y-2 overflow-auto"></div>
        <form id="quick-board-form" class="mt-5 flex flex-wrap gap-2">
          <input id="quick-board-name" class="h-10 min-w-0 flex-1 rounded-xl border border-black/15 px-3 text-[14px] outline-none transition focus:border-black/30 focus:ring-2 focus:ring-black/10" placeholder="Yeni pano adı" autocomplete="off">
          <button type="submit" class="h-9 shrink-0 rounded-full bg-[#1d1d1f] px-5 text-[13px] font-semibold text-white transition hover:bg-[#3a3a3c]">Oluştur</button>
        </form>
        <div class="mt-6 flex justify-end">
          <button type="button" id="board-cancel-btn" class="h-[34px] rounded-full border border-black/[0.12] px-4 text-[12px] font-medium text-[#0b0b0c] transition hover:bg-black/[0.04]">Vazgeç</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Favori ürün karşılaştırma (panelde kalır, ürünler sayfasına yönlendirmez) -->
  <div id="panel-compare-modal" class="hidden fixed inset-0 z-[60]">
    <div class="absolute inset-0 bg-black/45" data-panel-compare-close="1" aria-hidden="true"></div>
    <div class="absolute inset-3 sm:inset-5 md:inset-8 mx-auto flex max-h-[92vh] max-w-[1400px] flex-col overflow-hidden rounded-2xl border border-black/[0.08] bg-white shadow-2xl">
      <div class="flex flex-shrink-0 flex-wrap items-center justify-between gap-3 border-b border-black/[0.06] px-4 py-3 sm:px-5">
        <h2 class="text-[17px] font-semibold text-[#0b0b0c]">Karşılaştırma</h2>
        <div class="flex flex-wrap gap-2">
          <button type="button" id="panel-compare-pdf" class="h-9 rounded-full border border-black/15 px-4 text-[12px] font-medium hover:bg-black/[0.04]">PDF indir</button>
          <button type="button" id="panel-compare-back-pick" class="h-9 rounded-full border border-black/15 px-3 text-[12px] font-medium hover:bg-black/[0.04]">Seçimi düzenle</button>
          <button type="button" class="flex h-9 w-9 items-center justify-center rounded-full text-[#6e6e73] hover:bg-black/[0.06]" data-panel-compare-close="1" aria-label="Kapat">✕</button>
        </div>
      </div>
      <div id="panel-compare-body" class="flex-1 overflow-auto p-3 sm:p-4"></div>
    </div>
  </div>

  <script src="/core.js"></script>
  <script src="/layout.js"></script>
  <script>
    const TAB_LABELS = {
      "fav-products": "Favori ürünler",
      "fav-projects": "Favori projeler",
      "office-projects": "Ofis projeleri",
      "collections": "Koleksiyonlar",
      "moodboards": "Tasarım panoları"
    };
    let TAB_IDS = ["fav-products", "fav-projects", "collections", "moodboards"];

    function tabIdsForSession(session) {
      const base = ["fav-products", "fav-projects", "collections", "moodboards"];
      if (session?.architectProfileType === "office") {
        return ["fav-products", "fav-projects", "collections", "moodboards", "office-projects"];
      }
      return base;
    }

    function escHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    const PANEL_FB_IMAGES = [
      "https://images.unsplash.com/photo-1600607686527-6fb886090705?q=80&w=800",
      "https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?q=80&w=800",
      "https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&w=800",
    ];
    function panelProductImageUrl(p) {
      if (p.image) return p.image;
      const i = Math.abs(String(p.id || "").split("").reduce((a, c) => a + c.charCodeAt(0), 0) || 0) % PANEL_FB_IMAGES.length;
      return PANEL_FB_IMAGES[i];
    }

    let lastPanelCompareProducts = [];

    function buildPanelCompareTableHtml(prods) {
      const tech = (p) => p.technical || {};
      const rows = [
        { label: "Marka", get: (p) => p.brandName || "—" },
        { label: "Kategori", get: (p) => p.category || "—" },
        { label: "Özet", get: (p) => p.spec || "—" },
        { label: "Yangın sınıfı", get: (p) => tech(p).fireClass || "—" },
        { label: "Akustik", get: (p) => tech(p).acoustic || "—" },
        { label: "Boyutlar", get: (p) => tech(p).dimensions || "—" },
        { label: "Kalınlık", get: (p) => tech(p).thickness || "—" },
        { label: "Sertifikalar", get: (p) => tech(p).certificates || "—" },
        { label: "PDF", get: (p) => (p.files?.pdfUrl || p.hasPdf) ? "Var" : "Yok" },
        { label: "CAD", get: (p) => (p.files?.cadUrl || p.hasCad) ? "Var" : "Yok" },
        { label: "Görüntülenme", get: (p) => String(p.views ?? "—") },
      ];
      let thead = `<tr><th class="text-left text-[11px] font-semibold uppercase tracking-wide text-[#6e6e73] p-2 w-36 min-w-[8rem]">Özellik</th>`;
      prods.forEach((p) => {
        thead += `<th class="p-2 align-bottom min-w-[140px] max-w-[220px]"><div class="mb-2 aspect-[4/3] overflow-hidden rounded-xl bg-[#f5f5f7]"><img src="${escHtml(panelProductImageUrl(p))}" alt="" class="h-full w-full object-cover"></div><a href="/urun-unica-baffle.html?id=${encodeURIComponent(p.id)}" class="text-[13px] font-semibold leading-tight text-[#1d1d1f] hover:underline">${escHtml(p.name)}</a><p class="mt-1 text-[11px] text-[#6e6e73]">${escHtml(p.brandName || "")}</p></th>`;
      });
      thead += "</tr>";
      let tbody = "";
      rows.forEach((r) => {
        tbody += `<tr class="border-t border-black/[0.06]"><td class="p-2 text-[12px] font-medium text-[#6e6e73] align-top">${escHtml(r.label)}</td>`;
        prods.forEach((p) => {
          tbody += `<td class="p-2 text-[13px] text-[#1d1d1f] align-top">${escHtml(r.get(p))}</td>`;
        });
        tbody += "</tr>";
      });
      return `<div class="-mx-1 overflow-x-auto"><table class="w-full min-w-[640px] border-collapse"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
    }

    function closePanelCompareModal() {
      document.getElementById("panel-compare-modal").classList.add("hidden");
    }

    function exportPanelComparePdf() {
      const prods = lastPanelCompareProducts;
      if (!window.jspdf?.jsPDF || !prods?.length) {
        showToast("PDF için önce karşılaştırmayı aç.");
        return;
      }
      const tech = (p) => p.technical || {};
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
      const pageH = doc.internal.pageSize.getHeight();
      const pageW = doc.internal.pageSize.getWidth();
      const left = 12;
      const labelCol = 42;
      const colW = (pageW - left - labelCol - 8) / prods.length;
      let y = 12;
      doc.setFontSize(13);
      doc.setFont(undefined, "bold");
      doc.text("Archilink — Favori ürün karşılaştırması", left, y);
      doc.setFont(undefined, "normal");
      y += 6;
      doc.setFontSize(8);
      doc.setTextColor(100);
      doc.text("Görseller yalnızca web üzerinde gösterilir.", left, y);
      doc.text(new Date().toLocaleString("tr-TR"), pageW - 12, y, { align: "right" });
      doc.setTextColor(0);
      y += 10;
      const rowSpecs = [
        ["Ürün adı", (p) => p.name || "—"],
        ["Marka", (p) => p.brandName || "—"],
        ["Kategori", (p) => p.category || "—"],
        ["Özet", (p) => p.spec || "—"],
        ["Yangın sınıfı", (p) => tech(p).fireClass || "—"],
        ["Akustik", (p) => tech(p).acoustic || "—"],
        ["Boyutlar", (p) => tech(p).dimensions || "—"],
        ["Kalınlık", (p) => tech(p).thickness || "—"],
        ["Sertifikalar", (p) => tech(p).certificates || "—"],
        ["PDF", (p) => (p.files?.pdfUrl || p.hasPdf) ? "Var" : "Yok"],
        ["CAD", (p) => (p.files?.cadUrl || p.hasCad) ? "Var" : "Yok"],
        ["Görüntülenme", (p) => String(p.views ?? "—")],
      ];
      doc.setFontSize(8);
      rowSpecs.forEach(([label, get]) => {
        let rowH = 5;
        prods.forEach((p) => {
          const lines = doc.splitTextToSize(String(get(p) || "—"), colW - 1);
          rowH = Math.max(rowH, lines.length * 4.2 + 2);
        });
        if (y + rowH > pageH - 10) {
          doc.addPage();
          y = 12;
        }
        doc.setFont(undefined, "bold");
        doc.text(label + ":", left, y + 4);
        doc.setFont(undefined, "normal");
        prods.forEach((p, i) => {
          const x = left + labelCol + i * colW;
          const lines = doc.splitTextToSize(String(get(p) || "—"), colW - 1);
          doc.text(lines, x, y + 4);
        });
        y += rowH;
      });
      doc.save(`archilink-favori-karsilastirma-${Date.now()}.pdf`);
      showToast("PDF indirildi");
    }

    let activeTab = "fav-products";
    let moodboards = [];
    let selectedProduct = null;
    let cachedArchitectSession = null;
    const panelCache = {
      favProducts: null,
      favProjects: null,
      officeProjects: null,
      collections: null,
    };

    let favCompareMode = false;
    let favComparePickOrder = [];
    const favCompareMergedById = new Map();

    async function rebuildFavCompareMerge() {
      favCompareMergedById.clear();
      let favs = panelCache.favProducts;
      if (favs == null) {
        favs = await AG.getFavoriteProducts();
        panelCache.favProducts = favs;
      }
      const dbProds = await AG.getProducts();
      (favs || []).forEach((f) => {
        const full = dbProds.find((x) => x.id === f.id);
        if (full) {
          favCompareMergedById.set(full.id, full);
          return;
        }
        favCompareMergedById.set(f.id, {
          id: f.id,
          name: f.name || "",
          image: f.image || "",
          category: f.category || "",
          brandName: f.brandName || "",
          spec: f.spec || "",
          technical: f.technical && typeof f.technical === "object" ? f.technical : {},
          hasPdf: Boolean(f.hasPdf),
          hasCad: Boolean(f.hasCad),
          views: f.views || 0,
          files: f.files && typeof f.files === "object" ? f.files : {},
        });
      });
    }

    function exitFavCompareMode() {
      favCompareMode = false;
      favComparePickOrder = [];
      favCompareMergedById.clear();
      document.body.classList.remove("panel-fav-compare-active");
      const bar = document.getElementById("panel-fav-compare-bar");
      if (bar) bar.classList.add("hidden");
    }

    function updateFavCompareBarDisplay() {
      const n = favComparePickOrder.length;
      const t = document.getElementById("panel-fav-compare-bar-text");
      const showBtn = document.getElementById("panel-fav-compare-bar-show");
      if (t) t.textContent = `${n}/5 seçili · en fazla 5 ürün${n < 2 ? " (en az 2 gerekli)" : ""}`;
      if (showBtn) showBtn.disabled = n < 2;
    }

    function syncPanelFavCompareCardVisuals() {
      document.querySelectorAll("[data-panel-product-id]").forEach((cardEl) => {
        let id = "";
        try { id = decodeURIComponent(cardEl.getAttribute("data-panel-product-id") || ""); } catch (_) {}
        const on = Boolean(id && favComparePickOrder.includes(id));

        /* outline */
        if (!favCompareMode) {
          cardEl.classList.remove("outline", "outline-2", "outline-black", "outline-black/[0.08]");
        } else if (on) {
          cardEl.classList.add("outline", "outline-2", "outline-black");
          cardEl.classList.remove("outline-black/[0.08]");
        } else {
          cardEl.classList.add("outline", "outline-2", "outline-black/[0.08]");
          cardEl.classList.remove("outline-black");
        }

        /* overlay */
        const pcOverlay = cardEl.querySelector(".compare-overlay");
        if (pcOverlay) pcOverlay.style.display = on ? "block" : "none";

        /* badge */
        const oldBadge = cardEl.querySelector(".pc-compare-badge");
        if (oldBadge) oldBadge.remove();
        if (favCompareMode) {
          const badge = document.createElement("span");
          badge.className = "pc-compare-badge absolute top-2.5 right-2.5 z-20 pointer-events-none flex h-6 w-6 items-center justify-center rounded-md shadow";
          if (on) {
            badge.style.cssText = "background:#1d1d1f;";
            badge.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
          } else {
            badge.style.cssText = "background:rgba(255,255,255,0.92);border:2px solid rgba(0,0,0,0.18);";
          }
          cardEl.appendChild(badge);
        }
      });
      updateFavCompareBarDisplay();
    }

    function toggleFavPanelComparePick(id) {
      const ix = favComparePickOrder.indexOf(id);
      if (ix >= 0) favComparePickOrder.splice(ix, 1);
      else {
        if (favComparePickOrder.length >= 5) {
          showToast("En fazla 5 ürün seçebilirsin.");
          return;
        }
        favComparePickOrder.push(id);
      }
      syncPanelFavCompareCardVisuals();
    }

    function openPanelCompareResultFromPicks() {
      const prods = favComparePickOrder.map((id) => favCompareMergedById.get(id)).filter(Boolean);
      if (prods.length < 2) return;
      lastPanelCompareProducts = prods;
      document.getElementById("panel-compare-body").innerHTML = buildPanelCompareTableHtml(prods);
      document.getElementById("panel-compare-modal").classList.remove("hidden");
    }

    async function onPanelFavCompareToggle() {
      if (!favCompareMode) {
        await rebuildFavCompareMerge();
        if (favCompareMergedById.size < 2) {
          showToast("Karşılaştırmak için en az 2 favori ürün ekleyin.");
          return;
        }
        favCompareMode = true;
        favComparePickOrder = [];
        document.body.classList.add("panel-fav-compare-active");
        document.getElementById("panel-fav-compare-bar").classList.remove("hidden");
        updateFavCompareBarDisplay();
        await renderContent();
        showToast("Karşılaştırmak için kartlardaki kutucuğu işaretle (en fazla 5).");
        return;
      }
      exitFavCompareMode();
      await renderContent();
    }

    function tabButtonClass(on) {
      const base =
        "inline-flex items-center justify-center rounded-full px-3.5 h-[34px] text-[13px] font-medium transition whitespace-nowrap";
      return `${base} ${
        on ? "bg-[#0b0b0c] text-white shadow-sm" : "bg-[#f2f2f7] text-[#3a3a3c] hover:bg-[#e5e5ea]"
      }`;
    }

    function buildTabButtons() {
      const el = document.getElementById("tabs");
      el.innerHTML = TAB_IDS.map(
        (id) =>
          `<button type="button" role="tab" aria-selected="false" data-tab="${id}" class="${tabButtonClass(false)}">${TAB_LABELS[id]}</button>`
      ).join("");
    }

    function updateTabVisual() {
      document.querySelectorAll("#tabs [data-tab]").forEach((btn) => {
        const on = btn.dataset.tab === activeTab;
        btn.setAttribute("aria-selected", on ? "true" : "false");
        btn.className = tabButtonClass(on);
      });
    }

    function renderTabs() {
      const el = document.getElementById("tabs");
      if (!el.dataset.tabsBound) {
        el.dataset.tabsBound = "1";
        el.addEventListener("click", (ev) => {
          const btn = ev.target.closest("[data-tab]");
          if (!btn) return;
          const id = btn.dataset.tab;
          if (id === activeTab) return;
          if (activeTab === "fav-products" && favCompareMode) exitFavCompareMode();
          activeTab = id;
          updateTabVisual();
          void renderContent();
        });
        buildTabButtons();
      } else if (el.querySelectorAll("[data-tab]").length !== TAB_IDS.length) {
        buildTabButtons();
      }
      updateTabVisual();
    }

    function cardTemplate(item, href, withBoardAction = false, removeFavorite = null, favCompareOpts = null) {
      const safeProduct = encodeURIComponent(JSON.stringify({ id: item.id, name: item.name, image: item.image || "" }));
      const nm = escHtml(item.name || "Öğe");

    function showToast(text) {

      setTimeout(() => t.classList.add("hidden"), 2200);
    }

    function closeBoardModal() {
      document.getElementById("board-modal").classList.add("hidden");

    }

    function renderBoardList() {
      const wrap = document.getElementById("board-list");
      if (!moodboards.length) {
        wrap.innerHTML = `<p class="rounded-lg border border-dashed border-[#d2d2d7] bg-[#fafafa] px-4 py-6 text-center text-[14px] text-[#6e6e73]">Henüz pano yok. Aşağıdan oluşturabilirsin.</p>`;
        return;
      }
        wrap.innerHTML = moodboards.map((m) => `
        <button type="button" data-board-id="${m.id}" class="w-full rounded-xl border border-black/15 px-4 py-2.5 text-left text-[13px] font-medium text-[#0b0b0c] transition hover:bg-black/[0.04]">${m.name || "Tasarım panosu"}</button>
      `).join("");
      wrap.querySelectorAll("[data-board-id]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (!selectedProduct) return;
          const res = await AG.addProductToMoodboard({ moodboardId: btn.dataset.boardId, product: selectedProduct });
          if (!res.ok) return;
          moodboards = await AG.getMoodboards();
          closeBoardModal();
          showToast("Panoya eklendi");

      });

    async function boot() {
      await AG.ready;
      const session = await AG.getSessionArchitect();
      if (!session) { location.href = "/mimar-giris.html"; return; }
      cachedArchitectSession = session;
      const boards = await AG.getMoodboards();
      moodboards = boards;

      const prefetch = [
        AG.getFavoriteProducts(),
        AG.getFavoriteProjects(),
        AG.getCollections(),
      ];
      if (session.architectProfileType === "office") {
        prefetch.push(AG.getArchitectOfficeProjects());
      }
      const pref = await Promise.all(prefetch);
      panelCache.favProducts = pref[0];
      panelCache.favProjects = pref[1];
      panelCache.collections = pref[2];
      if (session.architectProfileType === "office") {
        panelCache.officeProjects = pref[3];
      }

      TAB_IDS = tabIdsForSession(session);
      if (location.hash === "#office-projects-panel" && session.architectProfileType === "office") {
        history.replaceState(null, "", `${location.pathname}?tab=office-projects`);
      }
      const urlTab = new URLSearchParams(location.search).get("tab");
      if (urlTab && TAB_IDS.includes(urlTab)) activeTab = urlTab;
      const roleLabel = session.architectProfileType === "office" ? "Mimarlık ofisi" : "Bireysel mimar";
      document.getElementById("welcome").textContent = `${session.name || "Mimar"} · ${roleLabel}`;
      renderTabs();
      renderContent();

      document.getElementById("logout-btn").addEventListener("click", async () => {
        await AG.logoutArchitect();
        location.href = "/mimar-giris.html";
      });

      const tabContentEl = document.getElementById("tab-content");
      tabContentEl.addEventListener("click", async (e) => {
        const nb = e.target.closest("[data-new-moodboard]");
        if (!nb) return;
        const res = await AG.createMoodboard({ name: "Yeni Tasarım Panosu" });
        if (res.ok) location.href = `/tasarim-panosu.html?id=${encodeURIComponent(res.moodboard.id)}`;
      });
      tabContentEl.addEventListener("submit", async (e) => {
        const form = e.target.closest("#collection-form");
        if (!form || form.id !== "collection-form") return;
        e.preventDefault();
        const name = String(new FormData(form).get("name") || "").trim();
        if (!name) return;
        const res = await AG.createCollection(name);
        if (!res.ok) return;
        panelCache.collections = null;
        await renderContent();
      });

      tabContentEl.addEventListener(
        "click",
        (e) => {
          if (activeTab !== "fav-products" || !favCompareMode) return;
          if (e.target.closest("[data-remove-fav-product], [data-add-board]")) return;
          if (e.target.closest(".pc-compare-badge")) return;
          const card = e.target.closest("[data-panel-product-id]");
          if (!card) return;
          let id = "";
          try {
            id = decodeURIComponent(card.getAttribute("data-panel-product-id") || "");
          } catch (_) {}
          if (!id) return;
          toggleFavPanelComparePick(id);
          e.preventDefault();
          e.stopPropagation();
        },
        true
      );

      document.getElementById("board-cancel-btn").addEventListener("click", closeBoardModal);
      document.querySelectorAll("[data-board-close='1']").forEach((el) => el.addEventListener("click", closeBoardModal));
      document.getElementById("quick-board-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        if (!selectedProduct) return;
        const name = document.getElementById("quick-board-name").value.trim();
        if (!name) return;
        const res = await AG.addProductToMoodboard({ moodboardName: name, product: selectedProduct });
        if (!res.ok) return;
        moodboards = await AG.getMoodboards();
        document.getElementById("quick-board-name").value = "";
        closeBoardModal();
        showToast("Panoya eklendi");
      });

      document.getElementById("panel-compare-modal").addEventListener("click", (e) => {
        if (e.target.closest("[data-panel-compare-close]")) closePanelCompareModal();
      });
      document.getElementById("panel-compare-pdf").addEventListener("click", () => exportPanelComparePdf());
      document.getElementById("panel-compare-back-pick").addEventListener("click", () => {
        closePanelCompareModal();
      });

      document.getElementById("panel-fav-compare-bar-cancel").addEventListener("click", async () => {
        exitFavCompareMode();
        await renderContent();
      });
      document.getElementById("panel-fav-compare-bar-show").addEventListener("click", () => {
        if (favComparePickOrder.length < 2) return;
        openPanelCompareResultFromPicks();
      });

      document.getElementById("architect-dashboard").addEventListener("click", async (e) => {
        if (e.target.closest("[data-panel-compare-toggle]")) {
          e.preventDefault();
          await onPanelFavCompareToggle();
          return;
        }

        const delMb = e.target.closest("[data-delete-moodboard]");
        if (delMb) {
          const mid = decodeURIComponent(delMb.getAttribute("data-delete-moodboard") || "");
          if (!mid || !confirm("Bu tasarım panosunu kaldırmak istediğine emin misin?")) return;
          const res = await AG.deleteMoodboard(mid);
          if (!res.ok) {
            showToast(res.message || "Kaldırılamadı");
            return;
          }
          moodboards = await AG.getMoodboards();
          showToast("Pano kaldırıldı");
          await renderContent();
          return;
        }

        const rp = e.target.closest("[data-remove-fav-product]");
        if (rp) {
          let payload;
          try {
            payload = JSON.parse(decodeURIComponent(rp.getAttribute("data-remove-fav-product") || "{}"));
          } catch {
            return;
          }
          if (!payload.id || !confirm("Bu ürünü favorilerden kaldırmak istediğine emin misin?")) return;
          const res = await AG.toggleFavoriteProduct(payload);
          if (!res.ok) {
            showToast(res.message || "Kaldırılamadı");
            return;
          }
          panelCache.favProducts = null;
          showToast("Favoriden kaldırıldı");
          await renderContent();
          return;
        }

        const rproj = e.target.closest("[data-remove-fav-project]");
        if (rproj) {
          let payload;
          try {
            payload = JSON.parse(decodeURIComponent(rproj.getAttribute("data-remove-fav-project") || "{}"));
          } catch {
            return;
          }
          if (!payload.id || !confirm("Bu projeyi favorilerden kaldırmak istediğine emin misin?")) return;
          const res = await AG.toggleFavoriteProject(payload);
          if (!res.ok) {
            showToast(res.message || "Kaldırılamadı");
            return;
          }
          panelCache.favProjects = null;
          showToast("Favoriden kaldırıldı");
          await renderContent();
          return;
        }

        const btn = e.target.closest("[data-delete-office-project]");
        if (!btn) return;
        const id = decodeURIComponent(btn.getAttribute("data-delete-office-project") || "");
        if (!id || !confirm("Bu ofis projesini silmek istediğine emin misin? (Referans listeden de kalkar.)")) return;
        const res = await AG.deleteArchitectOfficeProject(id);
        if (!res.ok) {
          showToast(res.message || "Silinemedi");
          return;
        }
        showToast("Proje silindi");
        panelCache.officeProjects = null;
        await renderContent();
      });
    }

    boot();
  </script>
</body>
</html>
