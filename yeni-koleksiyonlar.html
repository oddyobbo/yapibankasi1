<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function(){
      try {
        if (localStorage.getItem("ag_theme_v1") === "dark") {
          document.documentElement.classList.add("ag-dark");
          var st = document.createElement("style");
          st.id = "ag-theme-preload";
          st.textContent = "html.ag-dark{background:#111214;color:#eceef2;}html.ag-dark body{background:#111214;color:#eceef2;}";
          document.head.appendChild(st);
        }
      } catch (_) {}
    })();
  </script>
  <title>Archilink | Yeni Koleksiyonlar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body data-page="products" class="bg-white text-[#0b0b0c] min-h-screen">
  <div id="site-header"></div>

  <main class="px-6 lg:px-10 py-12">
    <section class="max-w-[1200px] mx-auto">
      <h1 class="text-[34px] leading-tight font-semibold tracking-tight">Yeni Koleksiyonlar</h1>
      <p class="text-[15px] text-[#6e6e73] mt-3 max-w-[65ch]">
        Bu alanı birlikte tasarlayacağız. Şimdilik yeni sezon koleksiyonları burada listelenecek şekilde hazırlandı.
      </p>

      <div class="mt-8 rounded-2xl border border-black/[0.08] bg-[#fafafa] p-8">
        <p class="text-[14px] text-[#3a3a3c]">
          Hazır olunca koleksiyon kartları, etiketler ve filtreleri bu sayfaya ekleyebiliriz.
        </p>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="/core.js"></script>
  <script src="/layout.js"></script>
</body>
</html>
