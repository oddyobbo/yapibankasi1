<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity | Tasarım Panosu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif; background: #f5f5f7; color: #111; margin: 0; overflow: hidden; }
    .tool-btn { width:40px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:10px; color:#6e6e73; cursor:pointer; transition:all .12s; border:none; background:transparent; margin:1px auto; }
    .tool-btn:hover { background:rgba(0,0,0,.06); color:#111; }
    .tool-btn.active { background:#111; color:#fff; }
    .tool-btn.danger:hover { background:rgba(220,38,38,.08); color:#dc2626; }
    .sep { height:1px; background:rgba(0,0,0,.07); margin:5px 8px; }
    .panel-label { font-size:10px; font-weight:600; color:#6e6e73; text-transform:uppercase; letter-spacing:.08em; padding:0 12px; margin-bottom:4px; margin-top:12px; display:block; }
    .prop-input { background:#fff; border:1px solid rgba(0,0,0,.12); color:#111; border-radius:7px; font-size:12px; padding:0 8px; height:28px; width:100%; outline:none; font-family:inherit; }
    .prop-input:focus { border-color:rgba(0,0,0,.35); }
    .prop-btn { height:28px; padding:0 10px; border-radius:7px; border:1px solid rgba(0,0,0,.12); background:#fff; color:#4a4a4f; font-size:12px; cursor:pointer; font-family:inherit; transition:all .12s; }
    .prop-btn:hover { background:#f5f5f7; color:#111; }
    .prop-btn.active { background:#111; border-color:#111; color:#fff; }
    .color-chip { width:22px; height:22px; border-radius:6px; cursor:pointer; border:2px solid transparent; transition:border .1s; flex-shrink:0; }
    .color-chip:hover, .color-chip.active { border-color:#111; }
    .range-input { -webkit-appearance:none; width:100%; height:4px; border-radius:2px; background:#e5e5ea; outline:none; }
    .range-input::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:#111; cursor:pointer; }
    #canvas-area canvas { display:block; box-shadow:0 4px 32px rgba(0,0,0,.13); border-radius:4px; }
    .dl-item { display:block; width:100%; text-align:left; padding:8px 14px; font-size:13px; color:#333; background:transparent; border:none; cursor:pointer; font-family:inherit; transition:background .1s; }
    .dl-item:hover { background:#f5f5f7; color:#111; }
    .ratio-btn { padding:4px 10px; border-radius:6px; border:1px solid rgba(0,0,0,.12); background:#fff; color:#4a4a4f; font-size:11px; cursor:pointer; font-family:inherit; transition:all .12s; white-space:nowrap; }
    .ratio-btn:hover { border-color:rgba(0,0,0,.3); color:#111; }
    .ratio-btn.active { background:#111; border-color:#111; color:#fff; }
  </style>
</head>
<body>
<div id="site-header"></div>

<div style="display:flex; height:calc(100vh - 56px);">

  <!-- ═══ SOL ARAÇ RAYI ═══ -->
  <div style="width:52px; background:#fff; border-right:1px solid rgba(0,0,0,.08); display:flex; flex-direction:column; padding:6px 0; overflow-y:auto; flex-shrink:0;">
    <a href="/mimar-paneli.html" title="Panele dön" class="tool-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <div class="sep"></div>
    <button id="t-select" class="tool-btn active" title="Seçim (V)" data-tool="select">
      <svg width="13" height="14" viewBox="0 0 13 15" fill="currentColor"><path d="M1 1l10.5 6.5L8 9 5.5 14 1 1z"/></svg>
    </button>
    <button id="t-text" class="tool-btn" title="Metin (T)" data-tool="text" style="font-size:15px;font-weight:700;color:inherit;">T</button>
    <button id="t-rect" class="tool-btn" title="Dikdörtgen (R)" data-tool="rect">
      <svg width="15" height="12" viewBox="0 0 15 12" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="1" width="13" height="10" rx="1.5"/></svg>
    </button>
    <button id="t-circle" class="tool-btn" title="Daire (C)" data-tool="circle">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="7" cy="7" r="6"/></svg>
    </button>
    <button id="t-line" class="tool-btn" title="Çizgi (L)" data-tool="line">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="2" y1="12" x2="12" y2="2"/></svg>
    </button>
    <button id="t-image" class="tool-btn" title="Görsel yükle (I)" data-tool="image">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    </button>
    <input id="file-input" type="file" accept="image/*" class="hidden" multiple>
    <div class="sep"></div>
    <button id="t-front" class="tool-btn" title="Öne getir">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </button>
    <button id="t-back" class="tool-btn" title="Arkaya gönder">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
    </button>
    <button id="t-dup" class="tool-btn" title="Çoğalt (Ctrl+D)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
    </button>
    <button id="t-lock" class="tool-btn" title="Kilitle/Aç">
      <svg width="13" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </button>
    <div class="sep"></div>
    <button id="t-undo" class="tool-btn" title="Geri al (Ctrl+Z)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M3 13A9 9 0 1012 3"/></svg>
    </button>
    <button id="t-redo" class="tool-btn" title="İleri al (Ctrl+Y)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 7v6h-6"/><path d="M21 13A9 9 0 1112 3"/></svg>
    </button>
    <div class="sep"></div>
    <button id="t-delete" class="tool-btn danger" title="Sil (Delete)">
      <svg width="13" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
    </button>
  </div>

  <!-- ═══ KANVAS ALANI ═══ -->
  <div style="flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden;">

    <!-- Üst bar -->
    <div style="height:50px; background:#fff; border-bottom:1px solid rgba(0,0,0,.08); display:flex; align-items:center; padding:0 14px; gap:8px; flex-shrink:0;">
      <input id="board-name" placeholder="Pano adı" style="background:transparent; border:1px solid rgba(0,0,0,.1); color:#111; border-radius:8px; font-size:13px; padding:0 10px; height:30px; outline:none; font-family:inherit; min-width:160px; max-width:240px;">
      <!-- Ratio seçici -->
      <div style="display:flex; align-items:center; gap:4px; margin-left:8px;">
        <button class="ratio-btn active" data-ratio="free">Serbest</button>
        <button class="ratio-btn" data-ratio="16:9">16:9</button>
        <button class="ratio-btn" data-ratio="4:3">4:3</button>
        <button class="ratio-btn" data-ratio="1:1">Kare</button>
        <button class="ratio-btn" data-ratio="a4-l">A4 Yatay</button>
        <button class="ratio-btn" data-ratio="a4-p">A4 Dikey</button>
        <button class="ratio-btn" data-ratio="story">Story</button>
      </div>
      <div style="margin-left:auto; display:flex; align-items:center; gap:8px;">
        <span id="save-msg" style="font-size:11px; color:#6e6e73;"></span>
        <div style="display:flex; align-items:center; gap:3px; background:#f5f5f7; border:1px solid rgba(0,0,0,.1); border-radius:8px; padding:0 8px; height:30px;">
          <button id="zoom-out" style="color:#6e6e73; background:none; border:none; cursor:pointer; font-size:16px; padding:0; line-height:1;">−</button>
          <span id="zoom-val" style="font-size:12px; color:#6e6e73; width:40px; text-align:center; user-select:none;">100%</span>
          <button id="zoom-in" style="color:#6e6e73; background:none; border:none; cursor:pointer; font-size:16px; padding:0; line-height:1;">+</button>
        </div>
        <button id="save-btn" style="height:30px; padding:0 16px; background:#111; color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:background .12s;" onmouseover="this.style.background='#333'" onmouseout="this.style.background='#111'">Kaydet</button>
        <div style="position:relative;">
          <button id="dl-btn" style="height:30px; padding:0 12px; background:#f5f5f7; color:#333; border:1px solid rgba(0,0,0,.1); border-radius:8px; font-size:13px; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:4px;">
            İndir <svg width="10" height="6" viewBox="0 0 10 6" fill="currentColor"><path d="M0 0l5 6 5-6z"/></svg>
          </button>
          <div id="dl-menu" style="display:none; position:absolute; right:0; top:36px; background:#fff; border:1px solid rgba(0,0,0,.1); border-radius:10px; overflow:hidden; z-index:999; min-width:150px; box-shadow:0 8px 24px rgba(0,0,0,.12);">
            <button class="dl-item" id="dl-jpg">JPG olarak indir</button>
            <button class="dl-item" id="dl-pdf">PDF olarak indir</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Kanvas -->
    <div id="canvas-area" style="flex:1; overflow:hidden; display:flex; align-items:center; justify-content:center; background:#f0f0f2; position:relative;">
      <canvas id="fc"></canvas>
    </div>
  </div>

  <!-- ═══ SAĞ PANEL: Sadece ürünler ═══ -->
  <div style="width:260px; background:#fff; border-left:1px solid rgba(0,0,0,.08); display:flex; flex-direction:column; overflow:hidden; flex-shrink:0;">
    <div style="padding:12px 12px 8px; flex-shrink:0;">
      <div style="font-size:13px; font-weight:600; color:#111; margin-bottom:8px;">Ürün Ekle</div>
      <input id="product-search" placeholder="Favorilerde ara..." style="width:100%; background:#f5f5f7; border:1px solid rgba(0,0,0,.1); color:#111; border-radius:8px; font-size:12px; padding:0 10px; height:30px; outline:none; font-family:inherit;">
    </div>
    <div id="fav-list" style="flex:1; overflow-y:auto; padding:0 12px 12px; display:flex; flex-direction:column; gap:5px; min-height:0;"></div>
  </div>

  <!-- ═══ Floating props panel (obje seçince çıkar) ═══ -->
  <div id="props-panel" style="display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#fff; border:1px solid rgba(0,0,0,.1); border-radius:14px; box-shadow:0 8px 32px rgba(0,0,0,.14); padding:12px 16px; z-index:500; max-width:680px; width:calc(100vw - 120px); max-height:260px; overflow-y:auto;"></div>
</div>

<div id="site-footer" style="display:none;"></div>

<!-- ═══ SCRIPTS ═══ -->
<script src="/core.js"></script>
<script src="/layout.js"></script>
<script>
const FALLBACK = "https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?q=80&w=800";
let fc, boardId, boardData, allFavs = [];
let activeTool = "select";
let zoom = 1;
let history = [], histIdx = -1, _histBusy = false;
let _autoSaveTimer = null;

// ─── Helpers ───────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function setSaveMsg(t, ok) {
  const el = $("save-msg");
  el.textContent = t;
  el.style.color = ok ? "#34d399" : "#666";
  if (ok) setTimeout(() => { el.textContent = ""; }, 3000);
}

// ─── Araç seçimi ───────────────────────────────────────────────────────────
function setTool(name) {
  activeTool = name;
  document.querySelectorAll("[data-tool]").forEach(b => b.classList.remove("active"));
  const btn = document.querySelector(`[data-tool="${name}"]`);
  if (btn) btn.classList.add("active");
  if (!fc) return;
  if (name === "select") {
    fc.isDrawingMode = false;
    fc.defaultCursor = "default";
    fc.selection = true;
    fc.forEachObject(o => { if (!o._locked) { o.selectable = true; o.evented = true; } });
  } else {
    fc.isDrawingMode = false;
    fc.defaultCursor = "crosshair";
    fc.selection = false;
    fc.forEachObject(o => { o.selectable = false; o.evented = false; });
    fc.discardActiveObject();
    fc.renderAll();
  }
}

// ─── History ───────────────────────────────────────────────────────────────
function pushHistory() {
  if (_histBusy || !fc) return;
  const json = fc.toJSON(["_locked"]);
  history = history.slice(0, histIdx + 1);
  history.push(JSON.stringify(json));
  if (history.length > 60) history.shift();
  histIdx = history.length - 1;
}
function undo() {
  if (histIdx <= 0 || !fc) return;
  histIdx--;
  _histBusy = true;
  fc.loadFromJSON(JSON.parse(history[histIdx]), () => {
    fc.renderAll(); _histBusy = false; updateProps();
  });
}
function redo() {
  if (histIdx >= history.length - 1 || !fc) return;
  histIdx++;
  _histBusy = true;
  fc.loadFromJSON(JSON.parse(history[histIdx]), () => {
    fc.renderAll(); _histBusy = false; updateProps();
  });
}

// ─── Fabric init ───────────────────────────────────────────────────────────
function initCanvas() {
  const area = $("canvas-area");
  const W = area.clientWidth;
  const H = area.clientHeight;
  fc = new fabric.Canvas("fc", {
    width: W, height: H,
    backgroundColor: "#ffffff",
    preserveObjectStacking: true,
    selection: true,
  });

  // Global handle style
  fabric.Object.prototype.set({
    borderColor: "#111",
    cornerColor: "#111",
    cornerStrokeColor: "#fff",
    cornerSize: 8,
    transparentCorners: false,
    borderScaleFactor: 1,
    padding: 4,
  });

  // Mouse:down → shape ekle
  fc.on("mouse:down", opt => {
    if (activeTool === "select") return;
    if (opt.target) { setTool("select"); return; }
    const p = fc.getPointer(opt.e);
    let obj;

    if (activeTool === "text") {
      obj = new fabric.IText("Metin gir...", {
        left: p.x, top: p.y,
        fontFamily: "Inter, sans-serif",
        fontSize: 28, fill: "#111111", editable: true,
      });
      fc.add(obj); fc.setActiveObject(obj);
      obj.enterEditing(); obj.selectAll();
    } else if (activeTool === "rect") {
      obj = new fabric.Rect({
        left: p.x - 80, top: p.y - 50,
        width: 160, height: 100,
        fill: "#e5e7eb", rx: 8, ry: 8,
        stroke: "transparent", strokeWidth: 0,
      });
      fc.add(obj); fc.setActiveObject(obj);
    } else if (activeTool === "circle") {
      obj = new fabric.Circle({
        left: p.x - 60, top: p.y - 60,
        radius: 60, fill: "#e5e7eb",
        stroke: "transparent", strokeWidth: 0,
      });
      fc.add(obj); fc.setActiveObject(obj);
    } else if (activeTool === "line") {
      obj = new fabric.Line([p.x - 60, p.y, p.x + 60, p.y], {
        stroke: "#6b7280", strokeWidth: 2,
      });
      fc.add(obj); fc.setActiveObject(obj);
    }

    setTool("select");
    fc.renderAll();
    pushHistory();
    updateProps();
  });

  fc.on("object:modified", () => { pushHistory(); updateProps(); scheduleAutoSave(); });
  fc.on("object:added", () => { if (!_histBusy) scheduleAutoSave(); });
  fc.on("selection:created", updateProps);
  fc.on("selection:updated", updateProps);
  fc.on("selection:cleared", updateProps);

  // Mouse wheel zoom
  fc.on("mouse:wheel", opt => {
    opt.e.preventDefault();
    const delta = opt.e.deltaY;
    let z = fc.getZoom();
    z *= 0.999 ** delta;
    z = Math.min(Math.max(z, 0.1), 5);
    fc.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, z);
    zoom = z;
    $("zoom-val").textContent = Math.round(z * 100) + "%";
  });

  // Space+drag / middle mouse pan
  let isPanning = false, lastPan = null;
  document.addEventListener("keydown", e => {
    if (e.code === "Space" && !["INPUT","TEXTAREA"].includes(document.activeElement.tagName)) {
      $("canvas-area").style.cursor = "grab";
    }
  });
  document.addEventListener("keyup", e => {
    if (e.code === "Space") $("canvas-area").style.cursor = "";
  });
  fc.on("mouse:down", opt => {
    const e = opt.e;
    if (e.button === 1 || (e.code === "Space") ||
        (e.buttons === 1 && e.altKey)) {
      isPanning = true;
      lastPan = { x: e.clientX, y: e.clientY };
      fc.defaultCursor = "grabbing";
    }
  });
  fc.on("mouse:move", opt => {
    if (!isPanning || !lastPan) return;
    const e = opt.e;
    const vp = fc.viewportTransform.slice();
    vp[4] += e.clientX - lastPan.x;
    vp[5] += e.clientY - lastPan.y;
    fc.setViewportTransform(vp);
    lastPan = { x: e.clientX, y: e.clientY };
  });
  fc.on("mouse:up", () => {
    isPanning = false; lastPan = null;
    if (activeTool === "select") fc.defaultCursor = "default";
  });

  // Resize
  window.addEventListener("resize", () => {
    if (!fc) return;
    fc.setDimensions({ width: $("canvas-area").clientWidth, height: $("canvas-area").clientHeight });
    fc.renderAll();
  });

  pushHistory();
}

// ─── Properties panel ──────────────────────────────────────────────────────
function updateProps() {
  const panel = $("props-panel");
  const obj = fc?.getActiveObject();

  if (!obj) {
    panel.style.display = "none";
    return;
  }
  panel.style.display = "block";

  const type = obj.type;
  const isText = type === "i-text" || type === "textbox";
  const isShape = type === "rect" || type === "circle" || type === "polygon";
  const isImg = type === "image";

  // Compact yatay layout
  let html = `<div style="display:flex; align-items:flex-start; gap:16px; flex-wrap:wrap;">`;

  // Konum/boyut grubu
  html += `<div>
    <div style="font-size:10px;font-weight:600;color:#6e6e73;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;">${isText?"Metin":isShape?"Şekil":isImg?"Görsel":type==="line"?"Çizgi":"Obje"}</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;">
      <div style="display:flex;flex-direction:column;gap:1px;"><span style="font-size:10px;color:#999;">X</span><input class="prop-input" id="p-x" type="number" value="${Math.round(obj.left)}" style="width:54px;"></div>
      <div style="display:flex;flex-direction:column;gap:1px;"><span style="font-size:10px;color:#999;">Y</span><input class="prop-input" id="p-y" type="number" value="${Math.round(obj.top)}" style="width:54px;"></div>
      <div style="display:flex;flex-direction:column;gap:1px;"><span style="font-size:10px;color:#999;">W</span><input class="prop-input" id="p-w" type="number" value="${Math.round(obj.getScaledWidth())}" style="width:54px;"></div>
      <div style="display:flex;flex-direction:column;gap:1px;"><span style="font-size:10px;color:#999;">H</span><input class="prop-input" id="p-h" type="number" value="${Math.round(obj.getScaledHeight())}" style="width:54px;"></div>
      <div style="display:flex;flex-direction:column;gap:1px;"><span style="font-size:10px;color:#999;">°</span><input class="prop-input" id="p-rot" type="number" min="0" max="360" value="${Math.round(obj.angle||0)}" style="width:46px;"></div>
      <div style="display:flex;flex-direction:column;gap:1px;"><span style="font-size:10px;color:#999;">Opaklık</span><input class="prop-input" id="p-opacity-num" type="number" min="0" max="100" value="${Math.round((obj.opacity||1)*100)}" style="width:52px;"></div>
    </div>
  </div>`;

  if (isText) {
    const fonts = ["-apple-system, BlinkMacSystemFont, sans-serif","Georgia, serif","Courier New, monospace","Impact, sans-serif","Arial Black, sans-serif"];
    html += `<div>
      <div style="font-size:10px;font-weight:600;color:#6e6e73;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;">Metin Stili</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:flex-end;">
        <div style="display:flex;flex-direction:column;gap:1px;"><span style="font-size:10px;color:#999;">Font</span>
          <select class="prop-input" id="p-font" style="width:110px;">${fonts.map(f=>`<option value="${f}" ${obj.fontFamily===f?"selected":""}>${f.split(",")[0].replace(/['"]/g,"")}</option>`).join("")}</select>
        </div>
        <div style="display:flex;flex-direction:column;gap:1px;"><span style="font-size:10px;color:#999;">Boyut</span>
          <select class="prop-input" id="p-fsize" style="width:60px;">${[10,12,14,16,18,20,24,28,32,40,48,56,72,96].map(s=>`<option value="${s}" ${obj.fontSize==s?"selected":""}>${s}</option>`).join("")}</select>
        </div>
        <div style="display:flex;flex-direction:column;gap:1px;"><span style="font-size:10px;color:#999;">Renk</span>
          <input type="color" id="p-fcolor" value="${obj.fill||'#111111'}" style="width:36px;height:28px;border-radius:7px;border:1px solid rgba(0,0,0,.12);cursor:pointer;padding:2px;">
        </div>
        <div style="display:flex;gap:3px;">
          <button class="prop-btn ${obj.fontWeight==='bold'?'active':''}" id="p-bold" style="font-weight:700;">B</button>
          <button class="prop-btn ${obj.fontStyle==='italic'?'active':''}" id="p-italic" style="font-style:italic;">I</button>
          <button class="prop-btn ${obj.underline?'active':''}" id="p-under" style="text-decoration:underline;">U</button>
        </div>
        <div style="display:flex;gap:3px;">
          <button class="prop-btn ${!obj.textAlign||obj.textAlign==='left'?'active':''}" id="p-align-l" title="Sola">⬛</button>
          <button class="prop-btn ${obj.textAlign==='center'?'active':''}" id="p-align-c" title="Orta">≡</button>
          <button class="prop-btn ${obj.textAlign==='right'?'active':''}" id="p-align-r" title="Sağa">▶</button>
        </div>
      </div>
    </div>`;
  }

  if (isShape) {
    html += `<div>
      <div style="font-size:10px;font-weight:600;color:#6e6e73;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;">Şekil</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:flex-end;">
        <div style="display:flex;flex-direction:column;gap:1px;"><span style="font-size:10px;color:#999;">Dolgu</span>
          <input type="color" id="p-fill" value="${obj.fill==='transparent'||!obj.fill?'#e5e7eb':obj.fill}" style="width:36px;height:28px;border-radius:7px;border:1px solid rgba(0,0,0,.12);cursor:pointer;padding:2px;">
        </div>
        <div style="display:flex;flex-direction:column;gap:1px;"><span style="font-size:10px;color:#999;">Kenar</span>
          <input type="color" id="p-stroke" value="${obj.stroke&&obj.stroke!=='transparent'?obj.stroke:'#000000'}" style="width:36px;height:28px;border-radius:7px;border:1px solid rgba(0,0,0,.12);cursor:pointer;padding:2px;">
        </div>
        <div style="display:flex;flex-direction:column;gap:1px;"><span style="font-size:10px;color:#999;">Kalınlık</span>
          <input class="prop-input" id="p-sw" type="number" min="0" max="40" value="${obj.strokeWidth||0}" style="width:52px;">
        </div>
        ${type==="rect"?`<div style="display:flex;flex-direction:column;gap:1px;"><span style="font-size:10px;color:#999;">Köşe r</span><input class="prop-input" id="p-rx" type="number" min="0" max="200" value="${obj.rx||0}" style="width:52px;"></div>`:""}
      </div>
    </div>`;
  }

  if (type === "line") {
    html += `<div>
      <div style="font-size:10px;font-weight:600;color:#6e6e73;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;">Çizgi</div>
      <div style="display:flex;gap:5px;align-items:flex-end;">
        <div style="display:flex;flex-direction:column;gap:1px;"><span style="font-size:10px;color:#999;">Renk</span>
          <input type="color" id="p-stroke" value="${obj.stroke||'#6b7280'}" style="width:36px;height:28px;border-radius:7px;border:1px solid rgba(0,0,0,.12);cursor:pointer;padding:2px;">
        </div>
        <div style="display:flex;flex-direction:column;gap:1px;"><span style="font-size:10px;color:#999;">Kalınlık</span>
          <input class="prop-input" id="p-sw" type="number" min="1" max="40" value="${obj.strokeWidth||2}" style="width:52px;">
        </div>
      </div>
    </div>`;
  }

  if (isImg) {
    html += `<div>
      <div style="font-size:10px;font-weight:600;color:#6e6e73;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;">Görsel</div>
      <div style="display:flex;gap:5px;align-items:flex-end;flex-wrap:wrap;">
        <button class="prop-btn" id="p-replace">Değiştir</button>
        <div style="display:flex;flex-direction:column;gap:1px;"><span style="font-size:10px;color:#999;">Köşe yuvarlama</span>
          <input class="prop-input" id="p-imgrx" type="number" min="0" max="50" value="${obj._rx||0}" style="width:60px;">
        </div>
      </div>
    </div>`;
  }

  html += `<div style="display:flex;align-items:flex-end;">
    <button id="p-delete" style="height:28px;padding:0 12px;background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2);color:#dc2626;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;" onmouseover="this.style.background='rgba(220,38,38,.12)'" onmouseout="this.style.background='rgba(220,38,38,.06)'">Sil</button>
  </div>`;

  html += `</div>`; // flex wrap container

  panel.innerHTML = html;

  // ── Property bindings ──
  function bind(id, fn) { const el=$(id); if(el) el.addEventListener("input", fn); }
  function bindClick(id, fn) { const el=$(id); if(el) el.addEventListener("click", fn); }
  function rerender() { fc.requestRenderAll(); updateProps(); pushHistory(); scheduleAutoSave(); }

  bind("p-x", e => { obj.set("left", +e.target.value); fc.renderAll(); });
  bind("p-y", e => { obj.set("top", +e.target.value); fc.renderAll(); });
  bind("p-w", e => { obj.scaleToWidth(+e.target.value); fc.renderAll(); });
  bind("p-h", e => { obj.scaleToHeight(+e.target.value); fc.renderAll(); });
  bind("p-rot", e => { obj.set("angle", +e.target.value); fc.renderAll(); });
  bind("p-opacity-num", e => {
    obj.set("opacity", Math.min(100,Math.max(0,+e.target.value))/100); fc.renderAll();
  });

  if (isText) {
    bind("p-font", e => { obj.set("fontFamily", e.target.value); rerender(); });
    bind("p-fsize", e => { obj.set("fontSize", +e.target.value); rerender(); });
    bind("p-fcolor", e => { obj.set("fill", e.target.value); fc.renderAll(); });
    bindClick("p-bold", () => { obj.set("fontWeight", obj.fontWeight==="bold"?"normal":"bold"); rerender(); });
    bindClick("p-italic", () => { obj.set("fontStyle", obj.fontStyle==="italic"?"normal":"italic"); rerender(); });
    bindClick("p-under", () => { obj.set("underline", !obj.underline); rerender(); });
    bindClick("p-align-l", () => { obj.set("textAlign","left"); rerender(); });
    bindClick("p-align-c", () => { obj.set("textAlign","center"); rerender(); });
    bindClick("p-align-r", () => { obj.set("textAlign","right"); rerender(); });
  }
  if (isShape || type==="line") {
    bind("p-fill", e => { obj.set("fill", e.target.value); fc.renderAll(); });
    bind("p-stroke", e => { obj.set("stroke", e.target.value); fc.renderAll(); });
    bind("p-sw", e => { obj.set("strokeWidth", +e.target.value); fc.renderAll(); });
    if (type==="rect") bind("p-rx", e => { obj.set({ rx: +e.target.value, ry: +e.target.value }); fc.renderAll(); });
  }
  if (isImg) {
    const replaceInput = document.createElement("input");
    replaceInput.type = "file"; replaceInput.accept = "image/*";
    replaceInput.addEventListener("change", () => {
      const f = replaceInput.files[0]; if(!f) return;
      const reader = new FileReader();
      reader.onload = ev => {
        fabric.Image.fromURL(ev.target.result, img => {
          img.scaleToWidth(obj.getScaledWidth());
          img.set({ left: obj.left, top: obj.top, angle: obj.angle });
          fc.remove(obj); fc.add(img); fc.setActiveObject(img); fc.renderAll();
          pushHistory(); updateProps();
        });
      };
      reader.readAsDataURL(f);
    });
    bindClick("p-replace", () => replaceInput.click());
    bind("p-imgrx", e => {
      const r = +e.target.value;
      obj._rx = r;
      const w = obj.getScaledWidth(), h = obj.getScaledHeight();
      obj.clipPath = r > 0 ? new fabric.Rect({ width: w/obj.scaleX, height: h/obj.scaleY, rx: r*(w/obj.scaleX)/100, ry: r*(h/obj.scaleY)/100, originX:"center", originY:"center" }) : null;
      fc.renderAll();
    });
  }
  bindClick("p-delete", deleteSelected);
}

// ─── Add image from URL ─────────────────────────────────────────────────────
function addImgFromURL(url, opts={}) {
  fabric.Image.fromURL(url, img => {
    const maxW = fc.width * 0.4;
    if (img.width > maxW) img.scaleToWidth(maxW);
    img.set({ left: fc.width/2 - img.getScaledWidth()/2, top: fc.height/2 - img.getScaledHeight()/2, ...opts });
    fc.add(img); fc.setActiveObject(img); fc.renderAll();
    pushHistory(); updateProps(); scheduleAutoSave();
  }, { crossOrigin: "anonymous" });
}

// ─── Delete ─────────────────────────────────────────────────────────────────
function deleteSelected() {
  const obj = fc?.getActiveObject();
  if (!obj) return;
  if (obj.type === "activeSelection") {
    obj.getObjects().forEach(o => fc.remove(o));
  } else { fc.remove(obj); }
  fc.discardActiveObject(); fc.renderAll();
  pushHistory(); updateProps(); scheduleAutoSave();
}

// ─── Duplicate ───────────────────────────────────────────────────────────────
function duplicate() {
  const obj = fc?.getActiveObject();
  if (!obj) return;
  obj.clone(cloned => {
    cloned.set({ left: (obj.left||0)+24, top: (obj.top||0)+24 });
    fc.add(cloned); fc.setActiveObject(cloned); fc.renderAll();
    pushHistory(); updateProps();
  });
}

// ─── Fav products ────────────────────────────────────────────────────────────
function renderFavs(list) {
  const wrap = $("fav-list");
  if (!list.length) {
    wrap.innerHTML = `<p style="font-size:11px;color:#555;padding:8px 0;">Favori ürün yok. <a href="/urunler.html" style="color:#3b82f6;">Ürünler sayfasından</a> ekle.</p>`;
    return;
  }
  wrap.innerHTML = list.map(p=>`
    <button draggable="true" data-pid="${p.id}" style="width:100%;display:flex;align-items:center;gap:8px;background:#f5f5f7;border:1px solid rgba(0,0,0,.08);border-radius:9px;padding:7px;cursor:grab;text-align:left;transition:border .12s;" onmouseover="this.style.borderColor='rgba(0,0,0,.25)'" onmouseout="this.style.borderColor='rgba(0,0,0,.08)'">
      <img src="${p.image||FALLBACK}" style="width:40px;height:40px;border-radius:7px;object-fit:cover;flex-shrink:0;" crossorigin="anonymous">
      <div style="min-width:0;">
        <div style="font-size:12px;font-weight:500;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
        <div style="font-size:11px;color:#6e6e73;margin-top:1px;">Tıkla veya sürükle</div>
      </div>
    </button>
  `).join("");

  wrap.querySelectorAll("[data-pid]").forEach(btn => {
    const p = list.find(x=>String(x.id)===btn.dataset.pid);
    if (!p) return;
    btn.addEventListener("click", () => addImgFromURL(p.image||FALLBACK));
    btn.addEventListener("dragstart", e => {
      e.dataTransfer.effectAllowed = "copy";
      e.dataTransfer.setData("application/json", JSON.stringify(p));
    });
  });
}

// ─── Drag-drop on canvas ─────────────────────────────────────────────────────
function initDragDrop() {
  const area = $("canvas-area");
  area.addEventListener("dragover", e => { e.preventDefault(); e.dataTransfer.dropEffect = "copy"; area.style.outline = "2px solid #3b82f6"; });
  area.addEventListener("dragleave", e => { if (!area.contains(e.relatedTarget)) area.style.outline = ""; });
  area.addEventListener("drop", e => {
    e.preventDefault(); area.style.outline = "";
    const rect = fc.getElement().getBoundingClientRect();
    const vp = fc.viewportTransform;
    const dropX = (e.clientX - rect.left - vp[4]) / vp[0];
    const dropY = (e.clientY - rect.top  - vp[5]) / vp[3];

    if (e.dataTransfer.files?.length) {
      const file = e.dataTransfer.files[0];
      if (!file.type.startsWith("image/")) return;
      const reader = new FileReader();
      reader.onload = ev => addImgFromURL(ev.target.result, { left: dropX - 110, top: dropY - 110 });
      reader.readAsDataURL(file);
      return;
    }
    const raw = e.dataTransfer.getData("application/json");
    if (raw) {
      try { const p = JSON.parse(raw); addImgFromURL(p.image||FALLBACK, { left: dropX-110, top: dropY-110 }); } catch {}
    }
  });
}

// ─── Save / Auto-save ────────────────────────────────────────────────────────
function scheduleAutoSave() {
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(saveBoard, 4000);
}
async function saveBoard() {
  if (!fc || !boardId) return;
  const name = $("board-name").value.trim() || "Tasarım Panosu";
  const canvas_json = JSON.stringify(fc.toJSON(["_locked","_rx"]));
  setSaveMsg("Kaydediliyor...", false);
  const res = await AG.updateMoodboard(boardId, { name, canvas_json });
  setSaveMsg(res.ok ? "Kaydedildi ✓" : "Kaydedilemedi", res.ok);
}

// ─── Boot ────────────────────────────────────────────────────────────────────
async function boot() {
  await AG.ready;
  const session = await AG.getSessionArchitect();
  if (!session) { location.href = "/mimar-giris.html"; return; }

  const qp = new URLSearchParams(location.search);
  boardId = qp.get("id");
  if (!boardId) {
    const r = await AG.createMoodboard({ name: "Yeni Tasarım Panosu" });
    if (r.ok) location.href = `/tasarim-panosu.html?id=${encodeURIComponent(r.moodboard.id)}`;
    return;
  }

  boardData = await AG.getMoodboard(boardId);
  if (!boardData) { setSaveMsg("Pano bulunamadı", false); return; }
  $("board-name").value = boardData.name || "Tasarım Panosu";

  initCanvas();
  setTool("select");

  if (boardData.canvas_json) {
    _histBusy = true;
    fc.loadFromJSON(JSON.parse(boardData.canvas_json), () => {
      fc.renderAll(); _histBusy = false;
      history = [JSON.stringify(fc.toJSON(["_locked","_rx"]))];
      histIdx = 0;
      updateProps();
    });
  } else if (Array.isArray(boardData.items) && boardData.items.length) {
    boardData.items.forEach(item => {
      if (item.image) {
        fabric.Image.fromURL(item.image, img => {
          img.scaleToWidth(item.w || 220);
          img.set({ left: item.x||50, top: item.y||50 });
          fc.add(img); fc.renderAll();
        }, { crossOrigin:"anonymous" });
      }
    });
    setTimeout(pushHistory, 800);
  } else {
    updateProps();
  }

  allFavs = await AG.getFavoriteProducts();
  renderFavs(allFavs);
  initDragDrop();

  // ── UI bindings ──
  $("t-select").addEventListener("click", () => setTool("select"));
  $("t-text").addEventListener("click",   () => setTool("text"));
  $("t-rect").addEventListener("click",   () => setTool("rect"));
  $("t-circle").addEventListener("click", () => setTool("circle"));
  $("t-line").addEventListener("click",   () => setTool("line"));
  $("t-image").addEventListener("click",  () => $("file-input").click());

  $("file-input").addEventListener("change", () => {
    Array.from($("file-input").files).forEach(file => {
      if (!file.type.startsWith("image/")) return;
      const r = new FileReader();
      r.onload = ev => addImgFromURL(ev.target.result);
      r.readAsDataURL(file);
    });
    $("file-input").value = "";
  });

  $("t-front").addEventListener("click", () => { const o=fc.getActiveObject(); if(o){fc.bringToFront(o);fc.renderAll();pushHistory();} });
  $("t-back").addEventListener("click",  () => { const o=fc.getActiveObject(); if(o){fc.sendToBack(o);fc.renderAll();pushHistory();} });
  $("t-dup").addEventListener("click",   duplicate);
  $("t-lock").addEventListener("click", () => {
    const o = fc.getActiveObject(); if(!o) return;
    o._locked = !o._locked;
    o.set({ selectable:!o._locked, evented:!o._locked, lockMovementX:o._locked, lockMovementY:o._locked, lockScalingX:o._locked, lockScalingY:o._locked, lockRotation:o._locked });
    fc.renderAll(); pushHistory();
  });
  $("t-undo").addEventListener("click",   undo);
  $("t-redo").addEventListener("click",   redo);
  $("t-delete").addEventListener("click", deleteSelected);
  $("save-btn").addEventListener("click",  saveBoard);

  // Zoom butons
  $("zoom-in").addEventListener("click",  () => { zoom = Math.min(5, +(zoom+0.1).toFixed(1)); fc.setZoom(zoom); $("zoom-val").textContent=Math.round(zoom*100)+"%"; });
  $("zoom-out").addEventListener("click", () => { zoom = Math.max(0.1, +(zoom-0.1).toFixed(1)); fc.setZoom(zoom); $("zoom-val").textContent=Math.round(zoom*100)+"%"; });

  // Download menu
  const dlBtn = $("dl-btn"), dlMenu = $("dl-menu");
  dlBtn.addEventListener("click", e => { e.stopPropagation(); dlMenu.style.display = dlMenu.style.display==="none"?"block":"none"; });
  document.addEventListener("click", () => { dlMenu.style.display="none"; });
  $("dl-jpg").addEventListener("click", () => {
    dlMenu.style.display="none";
    const url = fc.toDataURL({ format:"jpeg", quality:0.95, multiplier:2 });
    const a = document.createElement("a"); a.href=url; a.download=($("board-name").value||"pano")+".jpg"; a.click();
    setSaveMsg("JPG indirildi ✓", true);
  });
  $("dl-pdf").addEventListener("click", () => {
    dlMenu.style.display="none";
    const url = fc.toDataURL({ format:"jpeg", quality:0.92, multiplier:2 });
    const { jsPDF } = window.jspdf;
    const W = fc.width*2, H = fc.height*2;
    const pdf = new jsPDF({ orientation:W>H?"landscape":"portrait", unit:"px", format:[W,H] });
    pdf.addImage(url,"JPEG",0,0,W,H);
    pdf.save(($("board-name").value||"pano")+".pdf");
    setSaveMsg("PDF indirildi ✓", true);
  });

  // ── Ratio seçici ──
  const RATIOS = {
    "free":  null,
    "16:9":  [16,9],
    "4:3":   [4,3],
    "1:1":   [1,1],
    "a4-l":  [297,210],
    "a4-p":  [210,297],
    "story": [9,16],
  };
  document.querySelectorAll("[data-ratio]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("[data-ratio]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const ratio = RATIOS[btn.dataset.ratio];
      if (!ratio || !fc) return;
      const area = $("canvas-area");
      const maxW = area.clientWidth - 32;
      const maxH = area.clientHeight - 32;
      const [rw, rh] = ratio;
      let cw = maxW, ch = Math.round(maxW * rh / rw);
      if (ch > maxH) { ch = maxH; cw = Math.round(maxH * rw / rh); }
      fc.setDimensions({ width: cw, height: ch });
      fc.setZoom(1); zoom = 1; $("zoom-val").textContent = "100%";
      fc.renderAll();
    });
  });

  // Product search
  $("product-search").addEventListener("input", e => {
    const q = e.target.value.trim().toLowerCase();
    renderFavs(q ? allFavs.filter(p=>p.name.toLowerCase().includes(q)) : allFavs);
  });

  // Keyboard shortcuts
  document.addEventListener("keydown", e => {
    const tag = document.activeElement.tagName;
    if (["INPUT","TEXTAREA","SELECT"].includes(tag)) return;
    if ((e.ctrlKey||e.metaKey) && e.key==="z") { e.preventDefault(); undo(); }
    if ((e.ctrlKey||e.metaKey) && (e.key==="y"||(e.shiftKey&&e.key==="z"))) { e.preventDefault(); redo(); }
    if ((e.ctrlKey||e.metaKey) && e.key==="d") { e.preventDefault(); duplicate(); }
    if ((e.ctrlKey||e.metaKey) && e.key==="s") { e.preventDefault(); saveBoard(); }
    if (e.key==="Delete"||e.key==="Backspace") deleteSelected();
    if (e.key==="v"||e.key==="V") setTool("select");
    if (e.key==="t"||e.key==="T") setTool("text");
    if (e.key==="r"||e.key==="R") setTool("rect");
    if (e.key==="c"||e.key==="C") setTool("circle");
    if (e.key==="l"||e.key==="L") setTool("line");
    if (e.key==="Escape") { setTool("select"); fc.discardActiveObject(); fc.renderAll(); }
  });
}

boot();
</script>
</body>
</html>
