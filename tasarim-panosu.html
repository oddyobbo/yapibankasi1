<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity | Tasarım Panosu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .tool-btn { transition: all .12s ease; }
    .tool-btn.active { background:#111; color:#fff; border-color:#111; }
    #canvas-wrap canvas { display:block; border-radius:12px; box-shadow:0 1px 8px rgba(0,0,0,.08); }
  </style>
</head>
<body data-page="moodboard" class="bg-[#f5f5f7] text-[#111] min-h-screen">
  <div id="site-header"></div>

  <main class="px-4 lg:px-6 py-4">
    <section class="max-w-[1600px] mx-auto flex gap-3">

      <!-- Sol araç rayı -->
      <aside class="rounded-2xl border border-black/10 bg-white p-2 flex flex-col items-center gap-1.5 w-[68px] flex-shrink-0 sticky top-[86px] h-fit">

        <!-- Geri -->
        <a href="/mimar-paneli.html" title="Panele dön"
           class="w-11 h-11 rounded-xl border border-black/10 flex items-center justify-center text-[#6e6e73] hover:border-black/30 hover:bg-[#f5f5f7] transition">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </a>

        <div class="w-full h-px bg-black/[0.07]"></div>

        <!-- Seçim aracı -->
        <button id="tool-select" data-tool="select" title="Seçim aracı"
                class="tool-btn w-11 h-11 rounded-xl border border-black/10 flex items-center justify-center hover:border-black/30 hover:bg-[#f5f5f7]">
          <svg width="13" height="15" viewBox="0 0 13 15" fill="currentColor">
            <path d="M0 0v14.5l3.5-3.5H7L0 0z"/>
            <path d="M5 8.5l2 5 1-.4-2-5 2.5-.1L1 .5 5 8.5z" fill="currentColor"/>
          </svg>
        </button>

        <!-- Metin ekle -->
        <button id="tool-text" data-tool="text" title="Metin ekle (T)"
                class="tool-btn w-11 h-11 rounded-xl border border-black/10 flex items-center justify-center hover:border-black/30 hover:bg-[#f5f5f7] text-[15px] font-bold leading-none">
          T
        </button>

        <!-- Dikdörtgen -->
        <button id="tool-rect" data-tool="rect" title="Dikdörtgen ekle"
                class="tool-btn w-11 h-11 rounded-xl border border-black/10 flex items-center justify-center hover:border-black/30 hover:bg-[#f5f5f7]">
          <svg width="17" height="14" viewBox="0 0 17 14" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="1" y="1" width="15" height="12" rx="2"/>
          </svg>
        </button>

        <!-- Daire -->
        <button id="tool-circle" data-tool="circle" title="Daire ekle"
                class="tool-btn w-11 h-11 rounded-xl border border-black/10 flex items-center justify-center hover:border-black/30 hover:bg-[#f5f5f7]">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="8" cy="8" r="7"/>
          </svg>
        </button>

        <!-- Görsel yükle -->
        <button id="tool-image" title="Görsel yükle (bilgisayardan)"
                class="w-11 h-11 rounded-xl border border-black/10 flex items-center justify-center hover:border-black/30 hover:bg-[#f5f5f7] transition">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </button>
        <input id="file-input" type="file" accept="image/*" class="hidden" multiple>

        <!-- Arkaplan rengi -->
        <button id="tool-bg" title="Arkaplan rengi"
                class="w-11 h-11 rounded-xl border border-black/10 flex items-center justify-center hover:border-black/30 hover:bg-[#f5f5f7] transition">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
            <path d="M12 2v20M2 12h20" stroke-opacity=".4"/>
          </svg>
        </button>

        <div class="w-full h-px bg-black/[0.07]"></div>

        <!-- Öne getir -->
        <button id="tool-front" title="Öne getir"
                class="w-11 h-11 rounded-xl border border-black/10 flex items-center justify-center hover:border-black/30 hover:bg-[#f5f5f7] transition">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 19V5M5 12l7-7 7 7"/>
          </svg>
        </button>

        <!-- Arkaya gönder -->
        <button id="tool-back" title="Arkaya gönder"
                class="w-11 h-11 rounded-xl border border-black/10 flex items-center justify-center hover:border-black/30 hover:bg-[#f5f5f7] transition">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 5v14M5 12l7 7 7-7"/>
          </svg>
        </button>

        <!-- Sil -->
        <button id="tool-delete" title="Seçiliyi sil (Delete)"
                class="w-11 h-11 rounded-xl border border-black/10 flex items-center justify-center hover:border-red-200 hover:text-red-500 hover:bg-red-50 transition">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
          </svg>
        </button>

        <div class="w-full h-px bg-black/[0.07]"></div>

        <!-- İndir -->
        <button id="tool-download" title="İndir"
                class="w-11 h-11 rounded-xl border border-black/10 flex items-center justify-center hover:border-black/30 hover:bg-[#f5f5f7] transition">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 3v13M5 16l7 7 7-7"/>
            <path d="M3 21h18"/>
          </svg>
        </button>

      </aside>

      <!-- Kanvas bölümü -->
      <section class="rounded-2xl border border-black/10 bg-white overflow-hidden flex flex-col flex-1 min-w-0">

        <!-- Üst bar -->
        <div class="h-14 px-4 border-b border-black/10 flex items-center gap-3 flex-shrink-0">
          <input id="board-name"
                 class="h-9 rounded-lg border border-black/15 px-3 text-[14px] min-w-[200px] outline-none focus:border-black/30 transition"
                 placeholder="Pano adı">
          <div class="ml-auto flex items-center gap-2">
            <div class="h-9 px-3 rounded-lg border border-black/10 text-[12px] text-[#6e6e73] inline-flex items-center gap-1.5">
              <button id="zoom-out-btn" class="w-5 h-5 flex items-center justify-center text-[16px] leading-none hover:text-black">−</button>
              <span id="zoom-indicator" class="w-10 text-center tabular-nums">100%</span>
              <button id="zoom-in-btn" class="w-5 h-5 flex items-center justify-center text-[16px] leading-none hover:text-black">+</button>
            </div>
            <button id="save-btn"
                    class="h-9 px-4 rounded-lg bg-black text-white text-[13px] font-semibold hover:bg-[#222] transition">
              Kaydet
            </button>
            <span id="save-msg" class="text-[11px] text-[#6e6e73] hidden ml-1"></span>
          </div>
        </div>

        <!-- Kanvas wrap -->
        <div id="canvas-wrap" class="flex-1 bg-[#f3f4f6] p-4 relative overflow-hidden">
          <canvas id="fc"></canvas>
        </div>

      </section>

      <!-- Sağ panel -->
      <aside class="rounded-2xl border border-black/10 bg-white p-4 w-[280px] flex-shrink-0 overflow-hidden flex flex-col sticky top-[86px] h-[calc(100vh-112px)]">
        <h2 class="text-[14px] font-semibold mb-1">Ürün Ekle</h2>
        <p class="text-[12px] text-[#6e6e73] mb-3 flex-shrink-0">Favorilerinizden ürün seçin ya da bilgisayarınızdan görsel sürükleyin.</p>
        <input id="product-search"
               placeholder="Ürün ara..."
               class="w-full h-9 rounded-xl border border-black/10 px-3 text-[12px] mb-3 outline-none focus:border-black/30 flex-shrink-0 transition">
        <div id="favorites-list" class="space-y-2 flex-1 overflow-auto"></div>
        <p class="text-[11px] text-[#6e6e73] mt-3 flex-shrink-0">
          Önce <a href="/urunler.html" class="underline hover:text-black">Ürünler</a> sayfasından favorile.
        </p>
      </aside>

    </section>
  </main>

  <div id="site-footer"></div>

  <!-- Floating popup: arkaplan rengi -->
  <div id="bg-palette" class="hidden fixed z-[9999] bg-white rounded-2xl border border-black/10 shadow-xl p-3" style="min-width:148px">
    <p class="text-[11px] text-[#6e6e73] mb-2 font-medium">Arkaplan rengi</p>
    <div class="grid grid-cols-5 gap-1.5">
      <button data-bg="#f5f5f5"  class="w-6 h-6 rounded-md border border-black/15" style="background:#f5f5f5"  title="Açık gri"></button>
      <button data-bg="#ffffff"  class="w-6 h-6 rounded-md border border-black/15" style="background:#ffffff"  title="Beyaz"></button>
      <button data-bg="#111111"  class="w-6 h-6 rounded-md border border-black/15" style="background:#111111"  title="Siyah"></button>
      <button data-bg="#f5e6d3"  class="w-6 h-6 rounded-md border border-black/15" style="background:#f5e6d3"  title="Bej"></button>
      <button data-bg="#ddeeff"  class="w-6 h-6 rounded-md border border-black/15" style="background:#ddeeff"  title="Mavi"></button>
      <button data-bg="#e8f5e9"  class="w-6 h-6 rounded-md border border-black/15" style="background:#e8f5e9"  title="Yeşil"></button>
      <button data-bg="#fce4ec"  class="w-6 h-6 rounded-md border border-black/15" style="background:#fce4ec"  title="Pembe"></button>
      <button data-bg="#fff9c4"  class="w-6 h-6 rounded-md border border-black/15" style="background:#fff9c4"  title="Sarı"></button>
      <button data-bg="#ede7f6"  class="w-6 h-6 rounded-md border border-black/15" style="background:#ede7f6"  title="Mor"></button>
      <button data-bg="#efebe9"  class="w-6 h-6 rounded-md border border-black/15" style="background:#efebe9"  title="Kahve"></button>
    </div>
  </div>

  <!-- Floating popup: indir -->
  <div id="download-menu" class="hidden fixed z-[9999] bg-white rounded-xl border border-black/10 shadow-xl overflow-hidden" style="min-width:160px">
    <button id="dl-jpg" class="w-full text-left px-4 py-2.5 text-[13px] hover:bg-[#f5f5f7]">JPG olarak indir</button>
    <div class="h-px bg-black/[0.06]"></div>
    <button id="dl-pdf" class="w-full text-left px-4 py-2.5 text-[13px] hover:bg-[#f5f5f7]">PDF olarak indir</button>
  </div>

  <script src="/core.js"></script>
  <script src="/layout.js"></script>
  <script>
    const FALLBACK_IMG = "https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?q=80&w=1200&auto=format&fit=crop";

    let fc = null;
    let boardId = null;
    let boardData = null;
    let allFavProducts = [];
    let activeTool = "select";
    let zoomLevel = 1;

    const $id = (id) => document.getElementById(id);
    const saveMsgEl = $id("save-msg");
    const zoomEl = $id("zoom-indicator");

    // ── Helpers ──────────────────────────────────────────────────────────────

    function setSaveMsg(text, ok) {
      if (!text) { saveMsgEl.classList.add("hidden"); return; }
      saveMsgEl.textContent = text;
      saveMsgEl.className = `text-[11px] ml-1 ${ok ? "text-green-600" : "text-[#6e6e73]"}`;
      saveMsgEl.classList.remove("hidden");
      if (ok) setTimeout(() => saveMsgEl.classList.add("hidden"), 3000);
    }

    function setActiveTool(name) {
      activeTool = name;
      document.querySelectorAll(".tool-btn").forEach((btn) => {
        const on = btn.dataset.tool === name;
        btn.classList.toggle("active", on);
      });
      if (!fc) return;
      fc.defaultCursor = name === "select" ? "default" : "crosshair";
      fc.selection = name === "select";
      fc.forEachObject((o) => { o.selectable = name === "select"; o.evented = name === "select"; });
    }

    function showPopup(popup, anchor) {
      const r = anchor.getBoundingClientRect();
      popup.style.top  = `${r.top}px`;
      popup.style.left = `${r.right + 8}px`;
      popup.classList.remove("hidden");
    }

    function hideAllPopups() {
      $id("bg-palette").classList.add("hidden");
      $id("download-menu").classList.add("hidden");
    }

    function boardLabel() {
      return ($id("board-name").value.trim() || "tasarim-panosu")
        .replace(/\s+/g, "-").toLowerCase();
    }

    // ── Fabric canvas init ────────────────────────────────────────────────────

    function initCanvas() {
      const wrap = $id("canvas-wrap");
      const w = Math.max(500, wrap.clientWidth  - 32);
      const h = Math.max(400, window.innerHeight - 180);

      fc = new fabric.Canvas("fc", {
        width: w,
        height: h,
        backgroundColor: "#f5f5f5",
        preserveObjectStacking: true,
      });

      // Global object handle style (v5)
      fabric.Object.prototype.set({
        borderColor:        "#3b82f6",
        cornerColor:        "#3b82f6",
        cornerStrokeColor:  "#fff",
        cornerSize:         10,
        transparentCorners: false,
        borderScaleFactor:  1.5,
      });

      // Drawing tool: mouse:down
      fc.on("mouse:down", (opt) => {
        if (activeTool === "select") return;
        // Only draw on empty area (no target)
        if (opt.target) return;

        const pointer = fc.getPointer(opt.e);

        if (activeTool === "text") {
          const text = new fabric.IText("Metin gir...", {
            left: pointer.x,
            top:  pointer.y,
            fontFamily: "sans-serif",
            fontSize: 24,
            fill: "#111",
            editable: true,
          });
          fc.add(text);
          fc.setActiveObject(text);
          text.enterEditing();
          setActiveTool("select");

        } else if (activeTool === "rect") {
          const rect = new fabric.Rect({
            left: pointer.x - 100,
            top:  pointer.y - 60,
            width: 200, height: 120,
            fill: "#e5e7eb",
            rx: 8, ry: 8,
          });
          fc.add(rect);
          fc.setActiveObject(rect);
          setActiveTool("select");

        } else if (activeTool === "circle") {
          const circle = new fabric.Circle({
            left:   pointer.x - 60,
            top:    pointer.y - 60,
            radius: 60,
            fill: "#e5e7eb",
          });
          fc.add(circle);
          fc.setActiveObject(circle);
          setActiveTool("select");
        }

        fc.renderAll();
      });

      // Window resize
      window.addEventListener("resize", () => {
        if (!fc) return;
        const newW = Math.max(500, wrap.clientWidth  - 32);
        const newH = Math.max(400, window.innerHeight - 180);
        fc.setDimensions({ width: newW, height: newH });
        fc.renderAll();
      });
    }

    // ── Image helpers ─────────────────────────────────────────────────────────

    function addImageFromURL(url, overrides = {}) {
      fabric.Image.fromURL(url, (img) => {
        img.scaleToWidth(220);
        img.set({ left: fc.width / 2 - 110, top: fc.height / 2 - 110, ...overrides });
        fc.add(img);
        fc.setActiveObject(img);
        fc.renderAll();
      }, { crossOrigin: "anonymous" });
    }

    // ── Favorites list ────────────────────────────────────────────────────────

    function renderFavList(products) {
      const wrap = $id("favorites-list");
      if (!products.length) {
        wrap.innerHTML = `<p class="text-[12px] text-[#6e6e73] py-6 text-center">Favori ürün bulunamadı.</p>`;
        return;
      }
      wrap.innerHTML = products.map((p) => `
        <button draggable="true" data-product-id="${p.id}"
                class="w-full text-left rounded-xl border border-black/10 p-2 hover:border-black/35 hover:bg-[#fafafa] transition cursor-grab active:cursor-grabbing">
          <div class="flex gap-2 items-center">
            <img src="${p.image || FALLBACK_IMG}"
                 class="w-12 h-12 rounded-lg object-cover flex-shrink-0 pointer-events-none"
                 alt="${p.name}">
            <div class="min-w-0">
              <p class="text-[12px] font-medium leading-tight truncate">${p.name}</p>
              <p class="text-[11px] text-[#6e6e73] mt-0.5">Tıkla veya sürükle</p>
            </div>
          </div>
        </button>
      `).join("");

      wrap.querySelectorAll("[data-product-id]").forEach((btn) => {
        const product = products.find((x) => String(x.id) === btn.dataset.productId);
        if (!product) return;

        btn.addEventListener("click", () => {
          addImageFromURL(product.image || FALLBACK_IMG);
          setSaveMsg("Ürün eklendi. Kaydetmeyi unutma.", false);
        });

        btn.addEventListener("dragstart", (e) => {
          e.dataTransfer.effectAllowed = "copy";
          e.dataTransfer.setData("application/json", JSON.stringify(product));
        });
      });
    }

    // ── Save ──────────────────────────────────────────────────────────────────

    async function saveBoard() {
      if (!fc || !boardId) return;
      const name = $id("board-name").value.trim() || "Tasarım Panosu";
      setSaveMsg("Kaydediliyor...", false);
      const canvasJSON = fc.toJSON(["id", "productId", "name"]);
      const res = await AG.updateMoodboard(boardId, {
        name,
        canvas_json: JSON.stringify(canvasJSON),
      });
      if (!res.ok) { setSaveMsg(res.message || "Kaydedilemedi.", false); return; }
      setSaveMsg("Pano kaydedildi.", true);
    }

    // ── Boot ──────────────────────────────────────────────────────────────────

    async function boot() {
      await AG.ready;
      const session = await AG.getSessionArchitect();
      if (!session) { location.href = "/mimar-giris.html"; return; }

      const qp = new URLSearchParams(location.search);
      boardId = qp.get("id");

      if (!boardId) {
        const created = await AG.createMoodboard({ name: "Yeni Tasarım Panosu" });
        if (!created.ok) { setSaveMsg("Pano oluşturulamadı.", false); return; }
        location.href = `/tasarim-panosu.html?id=${encodeURIComponent(created.moodboard.id)}`;
        return;
      }

      boardData = await AG.getMoodboard(boardId);
      if (!boardData) { setSaveMsg("Pano bulunamadı.", false); return; }

      $id("board-name").value = boardData.name || "Tasarım Panosu";

      // Fabric canvas başlat
      initCanvas();
      setActiveTool("select");

      // Board yükle: canvas_json önce, sonra eski items[] fallback
      if (boardData.canvas_json) {
        try {
          fc.loadFromJSON(JSON.parse(boardData.canvas_json), () => fc.renderAll());
        } catch (err) {
          console.warn("canvas_json yüklenemedi:", err);
        }
      } else if (Array.isArray(boardData.items) && boardData.items.length > 0) {
        boardData.items.forEach((item) => {
          if (item.image) {
            fabric.Image.fromURL(item.image, (img) => {
              img.scaleToWidth(item.w || 220);
              img.set({ left: item.x || 50, top: item.y || 50 });
              fc.add(img);
              fc.renderAll();
            }, { crossOrigin: "anonymous" });
          }
        });
      }

      // Arkaplan rengi
      if (boardData.bgColor) {
        fc.backgroundColor = boardData.bgColor;
        fc.renderAll();
      }

      // Favori ürünler
      allFavProducts = await AG.getFavoriteProducts();
      renderFavList(allFavProducts);

      // ── Event listeners ──────────────────────────────────────────────────

      // Ürün arama
      $id("product-search").addEventListener("input", (e) => {
        const q = e.target.value.trim().toLowerCase();
        renderFavList(q ? allFavProducts.filter((p) => p.name.toLowerCase().includes(q)) : allFavProducts);
      });

      // Kaydet
      $id("save-btn").addEventListener("click", saveBoard);
      document.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "s") { e.preventDefault(); saveBoard(); }
      });

      // Delete tuşu
      document.addEventListener("keydown", (e) => {
        if ((e.key === "Delete" || e.key === "Backspace") &&
            !["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) {
          const obj = fc.getActiveObject();
          if (obj) { fc.remove(obj); fc.discardActiveObject(); fc.renderAll(); }
        }
      });

      // Araç butonları
      $id("tool-select").addEventListener("click", () => setActiveTool("select"));
      $id("tool-text"  ).addEventListener("click", () => setActiveTool("text"));
      $id("tool-rect"  ).addEventListener("click", () => setActiveTool("rect"));
      $id("tool-circle").addEventListener("click", () => setActiveTool("circle"));

      // Görsel yükle (file input)
      const fileInput = $id("file-input");
      $id("tool-image").addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", () => {
        Array.from(fileInput.files).forEach((file) => {
          if (!file.type.startsWith("image/")) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            fabric.Image.fromURL(ev.target.result, (img) => {
              img.scaleToWidth(220);
              img.set({ left: fc.width / 2 - 110, top: fc.height / 2 - 110 });
              fc.add(img);
              fc.setActiveObject(img);
              fc.renderAll();
            });
          };
          reader.readAsDataURL(file);
        });
        fileInput.value = "";
        setSaveMsg("Görsel eklendi. Kaydetmeyi unutma.", false);
      });

      // Z-order
      $id("tool-front").addEventListener("click", () => {
        const obj = fc.getActiveObject();
        if (obj) { fc.bringToFront(obj); fc.renderAll(); }
      });
      $id("tool-back").addEventListener("click", () => {
        const obj = fc.getActiveObject();
        if (obj) { fc.sendToBack(obj); fc.renderAll(); }
      });

      // Sil butonu
      $id("tool-delete").addEventListener("click", () => {
        const obj = fc.getActiveObject();
        if (obj) { fc.remove(obj); fc.discardActiveObject(); fc.renderAll(); }
      });

      // Zoom
      $id("zoom-in-btn").addEventListener("click", () => {
        zoomLevel = Math.min(3, +(zoomLevel + 0.1).toFixed(1));
        fc.setZoom(zoomLevel);
        zoomEl.textContent = `${Math.round(zoomLevel * 100)}%`;
      });
      $id("zoom-out-btn").addEventListener("click", () => {
        zoomLevel = Math.max(0.2, +(zoomLevel - 0.1).toFixed(1));
        fc.setZoom(zoomLevel);
        zoomEl.textContent = `${Math.round(zoomLevel * 100)}%`;
      });

      // Arkaplan rengi popup
      const bgBtn = $id("tool-bg");
      const bgPalette = $id("bg-palette");
      bgBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const vis = !bgPalette.classList.contains("hidden");
        hideAllPopups();
        if (!vis) showPopup(bgPalette, bgBtn);
      });
      bgPalette.addEventListener("click", (e) => e.stopPropagation());
      bgPalette.querySelectorAll("[data-bg]").forEach((btn) => {
        btn.addEventListener("click", () => {
          fc.backgroundColor = btn.dataset.bg;
          fc.renderAll();
          bgPalette.classList.add("hidden");
          if (boardData) boardData.bgColor = btn.dataset.bg;
        });
      });

      // İndir popup
      const dlBtn = $id("tool-download");
      const dlMenu = $id("download-menu");
      dlBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const vis = !dlMenu.classList.contains("hidden");
        hideAllPopups();
        if (!vis) showPopup(dlMenu, dlBtn);
      });
      dlMenu.addEventListener("click", (e) => e.stopPropagation());

      $id("dl-jpg").addEventListener("click", () => {
        dlMenu.classList.add("hidden");
        const dataURL = fc.toDataURL({ format: "jpeg", quality: 0.92, multiplier: 2 });
        const a = document.createElement("a");
        a.href = dataURL;
        a.download = `${boardLabel()}.jpg`;
        a.click();
        setSaveMsg("JPG indirildi.", true);
      });

      $id("dl-pdf").addEventListener("click", () => {
        dlMenu.classList.add("hidden");
        const dataURL = fc.toDataURL({ format: "jpeg", quality: 0.92, multiplier: 2 });
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
          orientation: fc.width > fc.height ? "landscape" : "portrait",
          unit: "px",
          format: [fc.width * 2, fc.height * 2],
        });
        pdf.addImage(dataURL, "JPEG", 0, 0, fc.width * 2, fc.height * 2);
        pdf.save(`${boardLabel()}.pdf`);
        setSaveMsg("PDF indirildi.", true);
      });

      // Popup kapat (dışarı tıklayınca)
      document.addEventListener("click", hideAllPopups);

      // ── Drag-drop: kanvasa bırakma ───────────────────────────────────────
      const canvasWrap = $id("canvas-wrap");

      canvasWrap.addEventListener("dragover", (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = "copy";
        canvasWrap.style.outline       = "3px solid #3b82f6";
        canvasWrap.style.outlineOffset = "-3px";
        canvasWrap.style.borderRadius  = "1rem";
      });

      canvasWrap.addEventListener("dragleave", (e) => {
        if (!canvasWrap.contains(e.relatedTarget)) {
          canvasWrap.style.outline = "";
        }
      });

      canvasWrap.addEventListener("drop", (e) => {
        e.preventDefault();
        canvasWrap.style.outline = "";

        const fcEl = fc.getElement();
        const rect  = fcEl.getBoundingClientRect();
        const dropX = (e.clientX - rect.left)  / zoomLevel;
        const dropY = (e.clientY - rect.top)   / zoomLevel;

        // Bilgisayardan dosya bırakma
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
          const file = e.dataTransfer.files[0];
          if (file.type.startsWith("image/")) {
            const reader = new FileReader();
            reader.onload = (evt) => {
              fabric.Image.fromURL(evt.target.result).then((img) => {
                img.scaleToWidth(220);
                img.set({ left: Math.max(0, dropX - 110), top: Math.max(0, dropY - 110) });
                fc.add(img);
                fc.setActiveObject(img);
                fc.renderAll();
                setSaveMsg("Görsel eklendi. Kaydetmeyi unutma.", false);
              });
            };
            reader.readAsDataURL(file);
          }
          return;
        }

        // Sağ panelden ürün bırakma
        const raw = e.dataTransfer.getData("application/json");
        if (raw) {
          try {
            const product = JSON.parse(raw);
            fabric.Image.fromURL(product.image || FALLBACK_IMG, (img) => {
              img.scaleToWidth(220);
              img.set({ left: Math.max(0, dropX - 110), top: Math.max(0, dropY - 110) });
              fc.add(img);
              fc.setActiveObject(img);
              fc.renderAll();
              setSaveMsg("Ürün eklendi. Kaydetmeyi unutma.", false);
            }, { crossOrigin: "anonymous" });
          } catch {}
        }
      });
    }

    boot();
  </script>
</body>
</html>
