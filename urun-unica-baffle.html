<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function(){
      try {
        if (localStorage.getItem("ag_theme_v1") === "dark") {
          document.documentElement.classList.add("ag-dark");
          var st = document.createElement("style");
          st.id = "ag-theme-preload";
          st.textContent = "html.ag-dark{background:#111214;color:#eceef2;}html.ag-dark body{background:#111214;color:#eceef2;}";
          document.head.appendChild(st);
        }
      } catch (_) {}
    })();
  </script>
  <title>Ürün Detayı | Archilink</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .gallery-main { aspect-ratio: 4/3; max-height: 520px; }
    html.ag-dark .ag-card { background: #1a1b1e; border-color: rgba(255,255,255,0.08); }
    html.ag-dark .ag-muted { color: #98989e; }
    html.ag-dark .ag-subtle { background: #141518; }

    .ag-product-detail {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    }

    /* ── Ürün detay tasarım sistemi (yalnızca bu sayfa) ── */
    .ag-detail-section {
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 16px;
      padding: 24px 32px;
      background: #fff;
    }
    html.ag-dark .ag-detail-section {
      background: #1a1b1e;
      border-color: rgba(255, 255, 255, 0.08);
    }

    .ag-detail-section-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.25;
      color: #0b0b0c;
      margin: 0 0 12px 0;
    }
    html.ag-dark .ag-detail-section-title {
      color: #f5f5f7;
    }

    .ag-detail-info-table {
      margin: 0;
    }
    .ag-detail-info-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 4px 16px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }
    html.ag-dark .ag-detail-info-row {
      border-bottom-color: rgba(255, 255, 255, 0.08);
    }
    .ag-detail-info-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    @media (min-width: 640px) {
      .ag-detail-info-row {
        grid-template-columns: minmax(180px, 240px) 1fr;
        align-items: baseline;
      }
    }

    /* Label: value ile aynı puntoda, daha güçlü ağırlık; soluk meta stili yok */
    .ag-detail-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.45;
      color: #1d1d1f;
    }
    html.ag-dark .ag-detail-label {
      color: #eceef2;
    }
    .ag-detail-value {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: normal;
      line-height: 1.45;
      color: #3a3a3c;
    }
    html.ag-dark .ag-detail-value {
      color: #c5c5c7;
    }

    .ag-detail-placeholder {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.45;
      color: #6e6e73;
      margin: 0;
    }
    html.ag-dark .ag-detail-placeholder {
      color: #98989e;
    }

    .ag-detail-file-group-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #1d1d1f;
      margin: 0 0 6px 0;
    }
    html.ag-dark .ag-detail-file-group-title {
      color: #eceef2;
    }
    .ag-detail-file-group + .ag-detail-file-group {
      margin-top: 12px;
    }
    .ag-detail-file-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .ag-detail-file-list li {
      margin: 0 0 4px 0;
    }
    .ag-detail-file-list a {
      font-size: 13px;
      font-weight: 500;
      color: #0071e3;
      text-decoration: none;
    }
    .ag-detail-file-list a:hover {
      text-decoration: underline;
    }
    html.ag-dark .ag-detail-file-list a {
      color: #64b5f6;
    }

    .ag-detail-usage-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .ag-detail-usage-list li {
      display: flex;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.45;
      color: #3a3a3c;
    }
    html.ag-dark .ag-detail-usage-list li {
      color: #c5c5c7;
    }
    .ag-detail-usage-list li span:first-child {
      color: #6e6e73;
      flex-shrink: 0;
    }
  </style>
</head>

  <script>
    function esc(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

          ],

          "https://images.unsplash.com/photo-1618211465998-61d291936d1c?q=80&w=1200&auto=format&fit=crop",
        ],
        technical: { acoustic: "NRC 0,75", fireClass: "A2-s1, d0", thickness: "10 mm", other: { "Kenar profili": "Düz", "Yüzey": "Dokulu keçe" } },

      },
      {

        name: "Lineer LED Profil Armatür",
        brandName: "Lumen Studio",
        category: "Mobilya ve Donatı > Aydınlatma",
        description: "Asma tavan ve yüzey montajına uygun, UGR düşük lineer LED profil. Ofis ve perakende için homojen ışık bandı.",
        image: "https://images.unsplash.com/photo-1565814329452-e1efa1c31789?q=80&w=1200&auto=format&fit=crop",
        gallery: [
          "https://images.unsplash.com/photo-1565814329452-e1efa1c31789?q=80&w=1200&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1513506003901-1e6a229e2d15?q=80&w=1200&auto=format&fit=crop",
        ],
        technical: {
          watt: "36 W / m",
          lumen: "4200 lm / m",
          kelvin: "3000K · 4000K · 5700K",
          cri: "CRI 90+",
          ipClass: "IP40 (iç mekan)",
          dimmable: "0–10V ve DALI",
          certificates: "ENEC",
          other: [{ label: "Montaj", value: "Tavan yüzeyi / pendant" }],
        },
        files: {
          pdfs: [{ url: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf", label: "Photometrik özet (PDF)" }],
          models3d: [{ url: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf", label: "3D blok (örnek)" }],
        },
        hasPdf: true,
      },
    ];

    const KEY_LABELS = {
      acoustic: "Akustik performans",
      fireClass: "Yangın sınıfı",
      thickness: "Kalınlık",
      usageScope: "Kullanım alanı",
      kullanimAlani: "Kullanım alanı",
      materialType: "Malzeme türü",
      malzemeTuru: "Malzeme türü",
      dimensions: "Ölçü / ebat",
      certificates: "Sertifikalar",
      watt: "Güç (W)",
      lumen: "Işık akısı (lm)",
      kelvin: "Renk sıcaklığı (K)",
      cri: "CRI",
      ipClass: "IP sınıfı",
      dimmable: "Dim",
      slipResistance: "Kaymazlık",
      waterAbsorption: "Su emme",
      rectified: "Rektifiye",
      stoneType: "Taş türü",
      origin: "Menşei",
    };

    const RESERVED = new Set([
      "other", "customFields", "diğerÖzellikler", "digerOzellikler", "additionalProperties",
      "gallery", "galleryUrls",
    ]);

    function usageByCategory(category) {
      const c = (category || "").toLowerCase();
      if (c.includes("akustik")) return ["Açık ofis", "Toplantı odaları", "Eğitim yapıları", "Otel ortak alanları"];
      if (c.includes("aydınlatma") || c.includes("led")) return ["Ofis genel aydınlatma", "Perakende vitrin", "Koridor ve geçiş", "Toplantı alanları"];
      if (c.includes("cephe")) return ["Dış cephe kaplama", "Kurumsal binalar", "Ticari projeler", "Karma kullanım yapıları"];
      if (c.includes("zemin")) return ["Konut projeleri", "Perakende alanları", "Lobi ve geçiş alanları", "Eğitim yapıları"];
      return ["Konut projeleri", "Ticari projeler", "Ofis alanları", "Karma kullanım yapıları"];
    }

    function productGalleryUrls(p) {
      const t = p.technical || {};
      const g = p.gallery || t.gallery || t.galleryUrls;
      if (Array.isArray(g) && g.length) return g.map(String).filter(Boolean);
      return [p.image].filter(Boolean);
    }

    function contactHref(extra) {
      const u = new URL("/iletisim-v2.html", location.origin);
      Object.entries(extra || {}).forEach(([k, v]) => { if (v != null && v !== "") u.searchParams.set(k, String(v)); });
      return u.pathname + u.search;
    }

    function categoryKind(cat) {
      const c = (cat || "").toLowerCase();
      if (c.includes("akustik")) return "acoustic";
      if (c.includes("aydınlatma") || c.includes("led") || c.includes("armatür")) return "lighting";
      if (c.includes("seramik") || c.includes("karo") || c.includes("porselen")) return "ceramic";
      if (c.includes("cephe") || c.includes("panel")) return "facade";
      return "general";
    }

    function sectionKeysForKind(kind, technical) {
      const keys = Object.keys(technical || {}).filter((k) => !RESERVED.has(k));
      if (kind === "acoustic") {
        const order = ["acoustic", "fireClass", "thickness", "usageScope", "kullanimAlani", "materialType", "malzemeTuru", "dimensions", "certificates"];
        return order.filter((k) => keys.includes(k)).concat(keys.filter((k) => !order.includes(k)));
      }
      if (kind === "lighting") {
        const order = ["watt", "lumen", "kelvin", "cri", "ipClass", "dimmable", "usageScope", "certificates"];
        return order.filter((k) => keys.includes(k)).concat(keys.filter((k) => !order.includes(k)));
      }
      return keys;
    }

    function renderInfoRows(keys, technical) {
      const rows = keys
        .map((k) => {
          const v = technical[k];
          if (v == null || v === "") return null;
          const label = KEY_LABELS[k] || k.replace(/([A-Z])/g, " $1").replace(/^./, (s) => s.toUpperCase());
          return `<div class="ag-detail-info-row">
            <div class="ag-detail-label">${esc(label)}</div>
            <div class="ag-detail-value">${esc(String(v))}</div>
          </div>`;
        })
        .filter(Boolean);
      return rows.join("");
    }

    function parseOther(technical) {
      const o = technical.other ?? technical.customFields ?? technical.diğerÖzellikler ?? technical.digerOzellikler;
      if (!o) return [];
      if (Array.isArray(o)) {
        return o.map((x) => {
          if (x && typeof x === "object") return { label: x.label || x.name || "Özellik", value: x.value ?? "—" };
          return null;
        }).filter(Boolean);
      }
      if (typeof o === "object") {
        return Object.entries(o).map(([label, value]) => ({ label, value: value ?? "—" }));
      }
      return [];
    }

    function buildTechnicalSection(product) {
      const technical = product.technical || {};
      const kind = categoryKind(product.category);
      const keys = sectionKeysForKind(kind, technical);
      const body = renderInfoRows(keys, technical);
      const inner = body
        ? `<div class="ag-detail-info-table">${body}</div>`
        : `<p class="ag-detail-placeholder">Bu ürün için teknik alanlar henüz girilmemiş.</p>`;
      return `<section class="ag-detail-section ag-card">
        <h2 class="ag-detail-section-title">Teknik Bilgiler</h2>
        ${inner}
      </section>`;
    }

    function buildOtherSection(product) {
      const other = parseOther(product.technical || {});
      let inner;
      if (other.length) {
        const rows = other.map(({ label, value }) => `
          <div class="ag-detail-info-row">
            <div class="ag-detail-label">${esc(label)}</div>
            <div class="ag-detail-value">${esc(String(value))}</div>
          </div>`).join("");
        inner = `<div class="ag-detail-info-table">${rows}</div>`;
      } else {
        inner = `<p class="ag-detail-placeholder">Henüz bilgi eklenmedi.</p>`;
      }
      return `<section class="ag-detail-section ag-card">
        <h2 class="ag-detail-section-title">Diğer Özellikler</h2>
        ${inner}
      </section>`;
    }

    function fallbackDocHref() {
      return contactHref({ konu: "dokuman", kaynak: "urun-detay" });
    }

    function collectFilesByType(p) {
      const f = p.files || {};
      const pdf = [];
      const dwg = [];
      const threeD = [];
      const pushPdf = (url, label) => {
        if (!url || !String(url).trim()) return;
        pdf.push({ href: String(url).trim(), label: label || "PDF" });
      };
      if (Array.isArray(f.pdfs)) {
        f.pdfs.forEach((x) => {
          if (!x) return;
          if (typeof x === "string") pushPdf(x, "PDF");
          else pushPdf(x.url, x.label || x.name);
        });
      }
      if (f.pdfUrl) pushPdf(f.pdfUrl, f.pdfLabel || "Teknik föy (PDF)");
      if (Array.isArray(f.pdfUrls)) f.pdfUrls.forEach((u, i) => pushPdf(u, `PDF ${i + 1}`));

      const pushDwg = (url, label) => {
        if (!url || !String(url).trim()) return;
        dwg.push({ href: String(url).trim(), label: label || "DWG" });
      };
      if (f.cadUrl) pushDwg(f.cadUrl, f.cadLabel || "2D çizim");
      if (Array.isArray(f.dwgs)) f.dwgs.forEach((x, i) => {
        if (typeof x === "string") pushDwg(x, `DWG ${i + 1}`);
        else pushDwg(x?.url, x?.label || `DWG ${i + 1}`);
      });

      const push3d = (url, label) => {
        if (!url || !String(url).trim()) return;
        threeD.push({ href: String(url).trim(), label: label || "3D" });
      };
      if (f.bimUrl) push3d(f.bimUrl, f.bimLabel || "3D / BIM");
      if (Array.isArray(f.models3d)) f.models3d.forEach((x, i) => {
        if (typeof x === "string") push3d(x, `3D ${i + 1}`);
        else push3d(x?.url, x?.label || `3D ${i + 1}`);
      });

      if (!pdf.length && p.hasPdf) pdf.push({ href: fallbackDocHref(), label: "PDF (talep üzerine)" });
      if (!dwg.length && p.hasCad) dwg.push({ href: fallbackDocHref(), label: "DWG (talep üzerine)" });

      return { pdf, dwg, threeD };
    }

    function renderFileGroup(title, items) {
      const lis = items.length
        ? items.map((it) => {
            const href = it.href;
            const target = href.startsWith("http") ? "_blank" : "_self";
            return `<li><a href="${esc(href)}" target="${target}" rel="noopener noreferrer">${esc(it.label)}</a></li>`;
          }).join("")
        : `<li><span class="ag-detail-placeholder">Henüz dosya eklenmedi</span></li>`;
      return `<div class="ag-detail-file-group">
        <h3 class="ag-detail-file-group-title">${esc(title)}</h3>
        <ul class="ag-detail-file-list">${lis}</ul>
      </div>`;
    }

    function buildFilesColumn(product) {
      const { pdf, dwg, threeD } = collectFilesByType(product);
      return (
        renderFileGroup("PDF Dosyaları", pdf) +
        renderFileGroup("DWG Dosyaları", dwg) +
        renderFileGroup("3D Dosyaları", threeD)
      );
    }

    function wireGallery(images, productName) {
      const main = document.getElementById("gallery-main-img");
      const thumbs = document.getElementById("gallery-thumbs");
      const prev = document.getElementById("gallery-prev");
      const next = document.getElementById("gallery-next");
      let idx = 0;
      const n = images.length;

      function renderThumbs() {
        thumbs.innerHTML = images.map((src, i) => `
          <button type="button" data-i="${i}" class="gallery-thumb shrink-0 w-16 h-16 sm:w-[72px] sm:h-[72px] rounded-xl overflow-hidden border-2 transition ${i === idx ? "border-[#1d1d1f] ring-2 ring-black/5" : "border-transparent opacity-70 hover:opacity-100"}">
            <img src="${esc(src)}" alt="" class="w-full h-full object-cover">
          </button>`).join("");
        thumbs.querySelectorAll(".gallery-thumb").forEach((btn) => {
          btn.addEventListener("click", () => { idx = +btn.getAttribute("data-i"); update(); });
        });
      }

      function update() {
        main.src = images[idx];
        main.alt = productName || "Ürün görseli";
        prev.style.display = n <= 1 ? "none" : "";
        next.style.display = n <= 1 ? "none" : "";
        renderThumbs();
      }

      prev.addEventListener("click", () => { idx = (idx - 1 + n) % n; update(); });
      next.addEventListener("click", () => { idx = (idx + 1) % n; update(); });
      update();
    }

    AG.ready.then(async () => {
      const params = new URLSearchParams(location.search);
      const id = params.get("id");
      const dbProducts = await AG.getProducts();
      const product = [...dbProducts, ...STATIC].find((x) => String(x.id) === String(id)) || STATIC[0];

      if (product?.id) AG.incrementView(product.id).catch(() => {});

      document.title = `${product.name || "Ürün Detayı"} | Archilink`;

      document.getElementById("hero-category").textContent = product.category || "Kategori";
      document.getElementById("hero-title").textContent = product.name || "Ürün";

      const descEl = document.getElementById("product-description");
      descEl.textContent = product.description || "Bu ürün için açıklama henüz eklenmedi.";

      const specEl = document.getElementById("product-spec-snippet");
      const spec = String(product.spec || "").trim();
      if (spec) {
        specEl.textContent = spec;
        specEl.classList.remove("hidden");
      } else {
        specEl.classList.add("hidden");
      }

      const brand = product.brandName || "—";
      document.getElementById("brand-name").textContent = brand;
      const av = document.getElementById("brand-avatar");
      av.textContent = (brand.trim().charAt(0) || "M").toUpperCase();

      const q = {
        konu: "urun",
        urun: product.name || "",
        marka: product.brandName || "",
        urunId: product.id != null ? String(product.id) : "",
      };
      document.getElementById("btn-teklif").href = contactHref({ ...q, talep: "teklif" });
      document.getElementById("btn-iletisim").href = contactHref({ ...q, talep: "iletisim" });

      const images = productGalleryUrls(product);
      wireGallery(images.length ? images : ["https://images.unsplash.com/photo-1600607686527-6fb886090705?q=80&w=1200"], product.name);

      document.getElementById("inject-technical").innerHTML = buildTechnicalSection(product);
      document.getElementById("inject-other").innerHTML = buildOtherSection(product);
      document.getElementById("inject-files").innerHTML = buildFilesColumn(product);

      const usageEl = document.getElementById("usage-list");
      usageEl.innerHTML = usageByCategory(product.category).map((u) =>
        `<li><span>•</span><span>${esc(u)}</span></li>`).join("");
    });
  </script>
</body>
</html>
