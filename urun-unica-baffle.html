  <script>
    function esc(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function valOrBelirtilmedi(v) {
      if (v == null || String(v).trim() === "") return "Belirtilmedi";
      return String(v);
    }

    function renderProductBreadcrumb(el, category, productName) {
      const parts = String(category || "Kategori")
        .split(">")
        .map((x) => x.trim())
        .filter(Boolean);
      if (productName) parts.push(String(productName).trim());
      el.innerHTML = parts
        .filter(Boolean)
        .map((part, index) => {
          const current = index === parts.length - 1 ? " is-current" : "";
          return `<span class="product-detail-breadcrumb-item${current}">${esc(part)}</span>`;
        })
        .join('<span class="product-detail-breadcrumb-separator">•</span>');
    }

    const COMPANY_ROLE_LABELS = {
      manufacturer: "Üretici",
      applicator: "Uygulama & montaj",
      integrator: "Sistem entegratörü",
      distributor: "Distribütör",
    };

    function parseBrandCategoriesFromCatalog(catalog, brandName) {
      const b = String(brandName || "").trim();
      if (!b) return [];
      const set = new Set();
      for (const p of catalog) {
        if (String(p.brandName || "").trim() !== b) continue;
        const from =
          Array.isArray(p.brandCategories) && p.brandCategories.length
            ? p.brandCategories
            : String(p.category || "")
                .split(">")
                .map((s) => s.trim())
                .filter(Boolean);
        from.forEach((x) => set.add(String(x)));
      }
      return [...set];
    }

    function resolveBrandCategoryChips(product, catalog) {
      const direct = Array.isArray(product.brandCategories) ? product.brandCategories.filter(Boolean) : [];
      if (direct.length) return direct.map(String);
      return parseBrandCategoriesFromCatalog(catalog, product.brandName);
    }

    function resolveBrandRoleKeys(product) {
      const r = Array.isArray(product.brandCompanyRoles) ? product.brandCompanyRoles : [];
      return r.map((k) => String(k).toLowerCase().trim()).filter(Boolean);
    }

    function renderBrandCategoryChips(el, labels) {
      if (!labels.length) {
        el.innerHTML = "";
        el.setAttribute("hidden", "");
        return;
      }
      el.removeAttribute("hidden");
      el.innerHTML = labels.map((t) => `<span class="product-detail-brand-chip">${esc(t)}</span>`).join("");
    }

    function renderBrandRoleTags(el, keys) {
      if (!keys.length) {
        el.innerHTML = "";
        el.setAttribute("hidden", "");
        return;
      }
      el.removeAttribute("hidden");
      el.innerHTML = keys
        .map((k) => {
          const label = COMPANY_ROLE_LABELS[k] || k.charAt(0).toUpperCase() + k.slice(1);
          return `<span class="product-detail-brand-role-pill">${esc(label)}</span>`;
        })
        .join("");
    }

    function usageByCategory(category) {
      const c = (category || "").toLowerCase();
      if (c.includes("akustik")) return ["Açık ofis", "Toplantı odaları", "Eğitim yapıları", "Otel ortak alanları"];
      if (c.includes("aydınlatma") || c.includes("led")) return ["Ofis genel aydınlatma", "Perakende vitrin", "Koridor ve geçiş", "Toplantı alanları"];
      if (c.includes("cephe")) return ["Dış cephe kaplama", "Kurumsal binalar", "Ticari projeler", "Karma kullanım yapıları"];
      if (c.includes("zemin")) return ["Konut projeleri", "Perakende alanları", "Lobi ve geçiş alanları", "Eğitim yapıları"];
      return ["Konut projeleri", "Ticari projeler", "Ofis alanları", "Karma kullanım yapıları"];
    }

    function productGalleryUrls(p) {
      const t = p.technical || {};
      const g = p.gallery || t.gallery || t.galleryUrls;
      if (Array.isArray(g) && g.length) return g.map(String).filter(Boolean);
      return [p.image].filter(Boolean);
    }

    function contactHref(extra) {
      const u = new URL("/iletisim-v2.html", location.origin);
      Object.entries(extra || {}).forEach(([k, v]) => { if (v != null && v !== "") u.searchParams.set(k, String(v)); });
      return u.pathname + u.search;
    }

    function parseOther(technical) {
      const o = technical.other ?? technical.customFields ?? technical.diğerÖzellikler ?? technical.digerOzellikler;
      if (!o) return [];
      if (Array.isArray(o)) {
        return o.map((x) => {
          if (x && typeof x === "object") return { label: x.label || x.name || "Özellik", value: x.value ?? "—" };
          return null;
        }).filter(Boolean);
      }
      if (typeof o === "object") {
        return Object.entries(o).map(([label, value]) => ({ label, value: value ?? "—" }));
      }
      return [];
    }

    function buildTechnicalSection(product) {
      const t = product.technical || {};
      const acoustic = valOrBelirtilmedi(t.acoustic);
      const fire = valOrBelirtilmedi(t.fireClass);
      const thickness = valOrBelirtilmedi(t.thickness);
      const dimensions = valOrBelirtilmedi(t.dimensions);
      const certificates = valOrBelirtilmedi(t.certificates);
      return `<article class="product-detail-section ag-card">
        <div class="product-detail-description-block">
          <h2 class="product-detail-section-title">Ürün Açıklaması</h2>
          <p id="product-description" class="product-detail-lead">—</p>
        </div>
        <h2 class="product-detail-section-title">Teknik Bilgiler</h2>
        <div class="product-detail-info-table">
          <div class="product-detail-info-row">
            <div class="product-detail-info-label">Akustik performans</div>
            <div class="product-detail-info-value" id="detail-acoustic">${esc(acoustic)}</div>
          </div>
          <div class="product-detail-info-row">
            <div class="product-detail-info-label">Yangın sınıfı</div>
            <div class="product-detail-info-value" id="detail-fire">${esc(fire)}</div>
          </div>
          <div class="product-detail-info-row">
            <div class="product-detail-info-label">Kalınlık</div>
            <div class="product-detail-info-value" id="detail-thickness">${esc(thickness)}</div>
          </div>
          <div class="product-detail-info-row">
            <div class="product-detail-info-label">Ölçü</div>
            <div class="product-detail-info-value" id="detail-dimensions">${esc(dimensions)}</div>
          </div>
          <div class="product-detail-info-row">
            <div class="product-detail-info-label">Sertifikalar</div>
            <div class="product-detail-info-value" id="detail-certificates">${esc(certificates)}</div>
          </div>
        </div>
      </article>`;
    }

    function buildOtherSection(product) {
      const other = parseOther(product.technical || {});
      let inner;
      if (other.length) {
        inner = other.map(({ label, value }) => `
          <div class="product-detail-info-row">
            <div class="product-detail-info-label">${esc(label)}</div>
            <div class="product-detail-info-value">${esc(String(value))}</div>
          </div>`).join("");
        inner = `<div class="product-detail-info-table">${inner}</div>`;
      } else {
        inner = `<p class="product-detail-muted">Bu ürün için ek özellik bilgisi henüz eklenmedi.</p>`;
      }
      return `<article class="product-detail-section ag-card">
        <h2 class="product-detail-section-title">Diğer Özellikler</h2>
        ${inner}
      </article>`;
    }


    function resolveVariants(product) {
      const direct = Array.isArray(product.variants) ? product.variants : [];
      if (direct.length) return direct;
      const t = product.technical || {};
      const raw = t.variants || t.variantlar || t.colorVariants || t.renkVaryantlari || t.renkVaryantları;
      if (Array.isArray(raw)) {
        return raw.map((x) => typeof x === "string" ? { name: x } : x).filter(Boolean);
      }
      const colorHint = parseOther(t).find((x) => String(x.label || "").toLowerCase().includes("renk"));
      if (colorHint?.value && String(colorHint.value).trim() !== "Belirtilmedi") {
        return [{ name: String(colorHint.value), code: "Varyant bilgisi" }];
      }
      return [];
    }

    function buildVariantsSection(product) {
      const variants = resolveVariants(product);
      if (!variants.length) {
        return `<article class="product-detail-section ag-card">
          <div class="product-detail-section-title-row">
            <h2 class="product-detail-section-title">Varyantlar</h2>
            <span class="product-detail-count-pill">0</span>
          </div>
          <p class="product-detail-muted">Bu ürün için varyant bilgisi henüz eklenmedi.</p>
        </article>`;
      }
      const cards = variants.map((v, i) => {
        const image = v.image || v.imageUrl || product.image || PREVIEW_IMG_FALLBACK;
        const name = v.name || v.title || `Varyant ${i + 1}`;
        const code = v.code || v.sku || v.model || "";
        const finish = v.finish || v.color || v.renk || v.surface || "";
        const size = v.size || v.dimensions || v.olcu || v["ölçü"] || "";
        return `<div class="product-detail-variant-card">
          <span class="product-detail-variant-thumb"><img src="${esc(image)}" alt="" loading="lazy" decoding="async"></span>
          <span class="product-detail-variant-copy">
            <span class="product-detail-variant-name">${esc(name)}</span>
            ${code ? `<span class="product-detail-variant-meta">${esc(code)}</span>` : ""}
            ${finish ? `<span class="product-detail-variant-meta">${esc(finish)}</span>` : ""}
            ${size ? `<span class="product-detail-variant-meta">${esc(size)}</span>` : ""}
          </span>
        </div>`;
      }).join("");
      return `<article class="product-detail-section ag-card">
        <div class="product-detail-section-title-row">
          <h2 class="product-detail-section-title">Varyantlar</h2>
          <span class="product-detail-count-pill">${variants.length}</span>
        </div>
        <div class="product-detail-variant-grid">${cards}</div>
      </article>`;
    }

    function renderBrandVariants(product) {
      const el = document.getElementById("brand-card-variants");
      const variants = resolveVariants(product).slice(0, 5);
      if (!el || !variants.length) {
        if (el) {
          el.innerHTML = "";
          el.setAttribute("hidden", "");
        }
        return;
      }
      el.removeAttribute("hidden");
      el.innerHTML = `<p>Varyantlar</p><div>${variants.map((v, i) => {
        const image = v.image || v.imageUrl || product.image || PREVIEW_IMG_FALLBACK;
        return `<span class="product-detail-brand-variant-dot" title="${esc(v.name || `Varyant ${i + 1}`)}"><img src="${esc(image)}" alt=""></span>`;
      }).join("")}</div>`;
    }

    function fallbackDocHref() {
      return contactHref({ konu: "dokuman", kaynak: "urun-detay" });
    }

    function collectFilesByType(p) {
      const f = p.files || {};
      const pdf = [];
      const dwg = [];
      const threeD = [];
      const pushPdf = (url, label) => {
        if (!url || !String(url).trim()) return;
        pdf.push({ href: String(url).trim(), label: label || "PDF" });
      };
      if (Array.isArray(f.pdfs)) {
        f.pdfs.forEach((x) => {
          if (!x) return;
          if (typeof x === "string") pushPdf(x, "PDF");
          else pushPdf(x.url, x.label || x.name);
        });
      }
      if (f.pdfUrl) pushPdf(f.pdfUrl, f.pdfLabel || "PDF");
      if (Array.isArray(f.pdfUrls)) f.pdfUrls.forEach((u, i) => pushPdf(u, `PDF ${i + 1}`));

      const pushDwg = (url, label) => {
        if (!url || !String(url).trim()) return;
        dwg.push({ href: String(url).trim(), label: label || "DWG" });
      };
      if (f.cadUrl) pushDwg(f.cadUrl, f.cadLabel || "DWG");
      if (Array.isArray(f.dwgs)) f.dwgs.forEach((x, i) => {
        if (typeof x === "string") pushDwg(x, `DWG ${i + 1}`);
        else pushDwg(x?.url, x?.label || `DWG ${i + 1}`);
      });

      const push3d = (url, label) => {
        if (!url || !String(url).trim()) return;
        threeD.push({ href: String(url).trim(), label: label || "3D" });
      };
      if (f.bimUrl) push3d(f.bimUrl, f.bimLabel || "3D");
      if (Array.isArray(f.models3d)) f.models3d.forEach((x, i) => {
        if (typeof x === "string") push3d(x, `3D ${i + 1}`);
        else push3d(x?.url, x?.label || `3D ${i + 1}`);
      });

      if (!pdf.length && p.hasPdf) pdf.push({ href: fallbackDocHref(), label: "PDF (talep üzerine)" });
      if (!dwg.length && p.hasCad) dwg.push({ href: fallbackDocHref(), label: "DWG (talep üzerine)" });

      return { pdf, dwg, threeD };
    }

    const FILE_ICON_SVG = {
      pdf: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8M16 17H8M10 9H8"/></svg>`,
      dwg: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`,
      three: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"/></svg>`,
    };

    const FILE_CHEVRON = `<span class="product-detail-file-item-chevron" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>`;

    function renderFileGroup(kind, title, items) {
      const iconClass =
        kind === "pdf" ? "product-detail-file-icon product-detail-file-icon--pdf" :
        kind === "dwg" ? "product-detail-file-icon product-detail-file-icon--dwg" :
        "product-detail-file-icon product-detail-file-icon--3d";
      const iconSvg = FILE_ICON_SVG[kind === "three" ? "three" : kind] || FILE_ICON_SVG.pdf;
      if (!items.length) {
        return `<div class="product-detail-file-group">
          <div class="product-detail-file-group-head">
            <span class="${iconClass}">${iconSvg}</span>
            <p class="product-detail-file-title">${esc(title)}</p>
          </div>
          <span class="product-detail-file-placeholder">Henüz dosya eklenmedi</span>
        </div>`;
      }
      const lis = items.map((it) => {
        const href = it.href;
        const target = href.startsWith("http") ? "_blank" : "_self";
        return `<li><a class="product-detail-file-item" href="${esc(href)}" target="${target}" rel="noopener noreferrer"><span>${esc(it.label)}</span>${FILE_CHEVRON}</a></li>`;
      }).join("");
      return `<div class="product-detail-file-group">
        <div class="product-detail-file-group-head">
          <span class="${iconClass}">${iconSvg}</span>
          <p class="product-detail-file-title">${esc(title)}</p>
        </div>
        <ul class="product-detail-file-list">${lis}</ul>
      </div>`;
    }

    function buildFilesColumn(product) {
      const { pdf, dwg, threeD } = collectFilesByType(product);
      return (
        renderFileGroup("pdf", "PDF Dosyaları", pdf) +
        renderFileGroup("dwg", "DWG / 2D Dosyaları", dwg) +
        renderFileGroup("three", "3D Dosyaları", threeD)
      );
    }

    const GALLERY_IMG_FALLBACK =
      "https://images.unsplash.com/photo-1600607686527-6fb886090705?q=80&w=1600&auto=format&fit=crop";
    const PREVIEW_IMG_FALLBACK =
      "https://images.unsplash.com/photo-1600607686527-6fb886090705?q=80&w=400&auto=format&fit=crop";

    function mergeProductCatalog(dbProducts, staticList) {
      const seen = new Set();
      const out = [];
      for (const p of [...(dbProducts || []), ...staticList]) {
        const k = String(p.id);
        if (seen.has(k)) continue;
        seen.add(k);
        out.push(p);
      }
      return out;
    }

    function renderBrandPreviewStrip(allProducts, product) {
      const el = document.getElementById("brand-preview-strip");
      const brand = String(product.brandName || "").trim();
      if (!brand) {
        el.innerHTML = "";
        return;
      }
      const others = allProducts.filter(
        (p) => String(p.id) !== String(product.id) && String(p.brandName || "").trim() === brand
      ).slice(0, 8);
      if (!others.length) {
        el.innerHTML = `<p class="product-detail-brand-preview-empty">Bu markaya ait başka ürün bulunmuyor.</p>`;
        return;
      }
      el.innerHTML = others
        .map((p) => {
          const url = productGalleryUrls(p)[0] || PREVIEW_IMG_FALLBACK;
          const href = `/urun-unica-baffle.html?id=${encodeURIComponent(p.id)}`;
          return `<a class="product-detail-brand-preview-item" href="${href}">
      <span class="product-detail-brand-preview-thumb"><img src="${esc(url)}" alt="" loading="lazy" decoding="async"></span>
      <span class="product-detail-brand-preview-name">${esc(p.name || "")}</span>
    </a>`;
        })
        .join("");
      const nextBtn = document.getElementById("brand-preview-next");
      if (nextBtn) {
        nextBtn.hidden = others.length < 4;
        nextBtn.onclick = () => el.scrollBy({ left: 224, behavior: "smooth" });
      }
      el.querySelectorAll(".product-detail-brand-preview-thumb img").forEach((img) => {
        img.addEventListener(
          "error",
          function handlePreviewImgErr() {
            img.removeEventListener("error", handlePreviewImgErr);
            if (img.src !== PREVIEW_IMG_FALLBACK) img.src = PREVIEW_IMG_FALLBACK;
          },
          { once: true }
        );
      });
    }

    function wireGallery(images, productName) {
      const main = document.getElementById("gallery-main-img");
      const prevImg = document.getElementById("gallery-prev-img");
      const nextImg = document.getElementById("gallery-next-img");
      const thumbs = document.getElementById("gallery-thumbs");
      const prev = document.getElementById("gallery-prev");
      const next = document.getElementById("gallery-next");
      let idx = 0;
      const n = images.length;

      function setGalleryImage(img, src, alt) {
        if (!img) return;
        img.onerror = function () {
          img.onerror = null;
          img.src = GALLERY_IMG_FALLBACK;
        };
        img.src = src;
        img.alt = alt || "";
      }

      function renderThumbs() {
        thumbs.innerHTML = images
          .map(
            (src, i) => `
          <button type="button" data-i="${i}" class="product-detail-gallery-thumb${i === idx ? " is-active" : ""}" aria-label="Görsel ${i + 1}">
            <img src="${esc(src)}" alt="" loading="${i > 2 ? "lazy" : "eager"}" decoding="async">
          </button>`
          )
          .join("");
        thumbs.querySelectorAll(".product-detail-gallery-thumb").forEach((btn) => {
          btn.addEventListener("click", () => {
            idx = +btn.getAttribute("data-i");
            update();
          });
        });
        thumbs.querySelectorAll(".product-detail-gallery-thumb img").forEach((img) => {
          img.addEventListener(
            "error",
            function onThumbErr() {
              img.removeEventListener("error", onThumbErr);
              img.src = GALLERY_IMG_FALLBACK;
            },
            { once: true }
          );
        });
      }

      function update() {
        const prevIndex = (idx - 1 + n) % n;
        const nextIndex = (idx + 1) % n;
        setGalleryImage(main, images[idx], productName || "Ürün görseli");
        setGalleryImage(prevImg, images[prevIndex], "");
        setGalleryImage(nextImg, images[nextIndex], "");
        if (prevImg) prevImg.closest(".product-detail-gallery-frame").hidden = n <= 1;
        if (nextImg) nextImg.closest(".product-detail-gallery-frame").hidden = n <= 1;
        prev.style.display = n <= 1 ? "none" : "";
        next.style.display = n <= 1 ? "none" : "";
        renderThumbs();
      }

      prev.addEventListener("click", () => {
        idx = (idx - 1 + n) % n;
        update();
      });
      next.addEventListener("click", () => {
        idx = (idx + 1) % n;
        update();
      });
      update();
    }

    AG.ready.then(async () => {
      const params = new URLSearchParams(location.search);
      const id = params.get("id");
      const dbProducts = await AG.getProducts();
      const catalog = mergeProductCatalog(dbProducts, STATIC);
      const product = catalog.find((x) => String(x.id) === String(id)) || STATIC[0];

      if (product?.id) AG.incrementView(product.id).catch(() => {});

      document.title = `${product.name || "Ürün Detayı"} | Archilink`;

      renderProductBreadcrumb(document.getElementById("hero-category"), product.category, "");
      renderProductBreadcrumb(document.getElementById("hero-category-visual"), product.category, product.name);
      document.getElementById("hero-title").textContent = product.name || "Ürün";
      document.getElementById("hero-title-visual").textContent = product.name || "Ürün";

      const sideTitle = document.getElementById("brand-card-product-title");
      if (sideTitle) sideTitle.textContent = product.name || "Ürün";
      const sideSummary = document.getElementById("brand-card-summary");
      if (sideSummary) sideSummary.textContent = product.description || "Teklif ve teknik konularda bu marka ile doğrudan iletişime geçebilirsiniz.";

      const brand = product.brandName || "—";
      document.getElementById("brand-name").textContent = brand;
      renderBrandCategoryChips(
        document.getElementById("brand-category-chips"),
        resolveBrandCategoryChips(product, catalog)
      );
      renderBrandRoleTags(document.getElementById("brand-role-tags"), resolveBrandRoleKeys(product));

      const av = document.getElementById("brand-avatar");
      const logoEl = document.getElementById("brand-logo");
      const logoUrl = String(product.brandLogo || product.logoUrl || product.logo || "").trim();
      if (logoUrl) {
        logoEl.src = logoUrl;
        logoEl.alt = brand;
        logoEl.classList.remove("is-hidden");
        av.classList.add("is-hidden");
      } else {
        logoEl.removeAttribute("src");
        logoEl.classList.add("is-hidden");
        av.classList.remove("is-hidden");
        av.textContent = (brand.trim().charAt(0) || "M").toUpperCase();
      }

      const brandListHref = "/urunler.html?q=" + encodeURIComponent(brand.trim() || "marka");
      document.getElementById("brand-more-products").href = brandListHref;
      renderBrandPreviewStrip(catalog, product);

      const q = {
        konu: "urun",
        urun: product.name || "",
        marka: product.brandName || "",
        urunId: product.id != null ? String(product.id) : "",
      };
      document.getElementById("btn-teklif").href = contactHref({ ...q, talep: "teklif" });
      document.getElementById("btn-iletisim").href = contactHref({ ...q, talep: "iletisim" });

      const images = productGalleryUrls(product);
      wireGallery(images.length ? images : ["https://images.unsplash.com/photo-1600607686527-6fb886090705?q=80&w=1200"], product.name);

      document.getElementById("inject-technical").innerHTML = buildTechnicalSection(product);
      const descEl = document.getElementById("product-description");
      if (descEl) descEl.textContent = product.description || "Bu ürün için açıklama henüz eklenmedi.";
      document.getElementById("inject-variants").innerHTML = buildVariantsSection(product);
      renderBrandVariants(product);
      document.getElementById("inject-other").innerHTML = buildOtherSection(product);
      document.getElementById("inject-files").innerHTML = buildFilesColumn(product);

      const usageEl = document.getElementById("usage-list");
      usageEl.innerHTML = usageByCategory(product.category).map((u) =>
        `<li>${esc(u)}</li>`).join("");
    });
  </script>
</body>
</html>
